body:
  text: 宋景濓未刻集卷上明宋濓撰頌皇太子受玉册頌至正十五年春三月丁亥朔越八日甲午皇帝命太尉汪家努持節授皇太子玉册及冕服九旒在廷臣鄰莫不駿奔東朝恭行大禮越翼日乙未復詣大明殿俯伏拜舞舉觴上千萬歲壽百僚具欣無間小大僉曰我太祖聖武皇帝茂昭寶訓預建冡嫡嗣服繼統纍葉上承靈貺罔敢或違今我皇帝春秋方􅎋即定元良以紹隆丕構其神謨睿斷與雷霆同其英烈山嶽同其雄高河海同其幽深求之前古敻然無比嗚呼盛哉然以萬國至衆主器至重豫定則治否則亂治亂所關不翅一反掌之易布在方策蓋可見已奈何為人上者不是之思嗣亂相尋有不忍言惟我皇帝聖神文武與天同運而不以四海自私惟皇太子剛果溫文與聖合德而足膺主鬯之寄明兩作離照耀無窮對越天地之耿光丕承祖宗之休烈是可以無愧者矣易曰主器莫若長子記曰一人元良萬國以正其是之謂乎臣濓遐方賤士躬聞大慶不敢喑無聲歌謹遵詩人美盛德之義而作頌曰皇朝御宇圖治靡寧邦本既建萬國以正仰瞻紫微中居帝座前星煌煌厥象斯著聖人法天夙夜弗違爰升上嗣以弼大基春日載陽洊雷出震龜協筮從降兹大訓乃勑近臣持節而馳錫以玉册冕服九旒叶音釐帝曰休哉神器甚重繼體之思朕敢不悚汝宜敬事勿懈益恭服滋寵嘉祗謁太宫勿謂天高徵應甚速勿謂宫深千里在目若軍若國汝撫汝監流祚無窮朕心乃安皇儲翼翼拜手稽首臣敢不朂以主鬯負百僚萃止冠辨之峨舞蹈不足繼以咏歌四海之命懸於元冡少陽位隆不震不動何威弗宣何氣弗清太白斂芒天髙日明微臣作頌流播盛德勒之貞珉埀示千億皇太子入學頌至正九年某月日皇帝開端本堂命皇太子肄業其中致聖功也前期一日司經設帝坐于堂中南面朱几在其南薌俎又在朱几南俎前有筵復設皇太子位于坐西東面太子太傅位于坐東西面諭德贊善二人文學一人位在太傅之東皆西面北上厥明司經以裕皇所御聖典置朱几上公卿子從學者分東西序立堂南北面以中為上正字一人司經一人對立兩序端以劾不如儀者贊者𨗳皇太子就位立諭德以下亦如之皇帝遣使者來致命在位者皆北面立受以次出堂門外望北闕再拜者二復初位贊者又𨗳皇太子至薌俎南北面立升筵再拜就筵北跪焫薌于爐者三少退再拜復位立如初凡拜若跪公卿子咸從司經以聖典還閣几與俎皆徹皇太子即位坐諭德以下皆坐公卿子别設几席于諭德位西皆再拜贊者引齒最長者一人執贄自門左入即席跪奠贄于几復位如初又再拜拜已執斚以升執尊及脯醢者從詣諭德西東面立注酒于斚即席跪行一獻禮從者薦脯醢贊善文學亦如之少退執事者勺酒授諭德以酢獻者復位如初皆再拜贊者退司經設授讀位正字一人執策啓皇太子受經一人詣諭德請授經至位東西相向坐授受已復位如初惟皇帝丕式先王成憲敷佑四方旁求俊彥用迪皇太子以學惟敬惟慎如此其至實萬世無疆之休敢拜手稽首而獻頌曰於赫皇帝日照月臨飇馳霆轟克威克明國本既定叶音庭萬方靡弗承乃命宫師乃闢宫學侯咨侯度侯究侯宅于彼有覺宫學峨峨龍樓之阿奕奕其楹侐侐其廷既穆且貞皇帝曰噫莽莽九圍此實其基其基何居有書有詩羽籥干戈亦以其時爾尚朂哉毋越我彛我心我縻毋隳我維我善我師上窺黃虞百度惟熙皇儲曰都敢不敬恭以養其蒙以徼其功以逹于家邦叶布洪切旭日煌煌出自東方鸞車彭彭青旗陽陽珮玉鏘鏘躋彼新堂載誦載弦或舞以揚帝命罔敗荒維幅員既長維天命靡常匪德曷臧兢兢皇皇寤寐弗忘於赫皇帝詒謀寧止皇儲則之學又蒸止百祿盈止庶績凝止庶績凝止萬世期無已國朝名臣頌有序帝王之興必有不世出之人豪以自赴雲龍風虎之會易所謂聖人作而萬物覩者是已我皇元受天明命撫安方夏天戈所指萬方畢從是故一鼓而諸部服再鼓而夏人納欵三鼓而完顔氏請降四鼓而南宋平東西極日之出入罔不洽被政教共惟帝臣雖睿謀雄斷動無不勝亦賴熊羆之士不二心之臣有以誕宣天威故功成治定若是之神速也自今觀之陷陳攻城無戰弗克則有若魯國忠武王之倫面折廷諍丕贊皇猷則有若耶律文正王之屬斟酌百王恢𢎞文教則有若許文正公之流其他智士謀臣袂接肩摩殆未可以一二數稽之於書在虞則有四嶽九官十二牧以亮天功在商則有六臣保乂有殷禮陟配天在周則有五臣為輔以克修和我有夏以皇朝嫓之未足多讓夫以明良相逢如此之盛治功告成又如此之懿意謂有以宣著鴻猷勒之琬琰昭示無極逮兹百年而頌聲不作非甚闕典歟漢唐之臣本無足議陸機吕溫尚濃墨大書為之頌贊况逢今日昌熙之運安可默默濓竊不自揆輒取行事著明熟於耳目者自魯國忠武王而下凡二十二人人各為頌雖立言不文亦頗謂能美盛德之形容使讀之者知列聖之勤勞諸臣之忠藎王業之成匪一朝夕其於治道似不為無所助也苐以金匱石室之藏遠在天上有非遐方陋儒所得窺故其所頌止此而已非敢有所略也魯國忠武王穆呼哩鄂諾之河白氣如虹王生其中虎首虬須為天下雄光輔帝極憲天惟聰如鷹之揚如飈之發如雲之從右執大斧左櫜彤弓鐵壘層層一劈而崩遹駿有聲諸部用平相彼完顔逞于淫凶我伐用張旗鼓有容僵尸百餘里澮河為紅太行以南斂手就降叶音紅帝録其功錫茆土之封丹書鐵劵與國始終傳世于無窮淮忠武王巴延淮王桓桓凝峻寡言一言之間如雷破山及履上台四國爾瞻誓師南征大亂汝戡三軍飛渡目無江南前扼其吭宋膽自寒老梟既夜遁直搗臨安俘厥君臣大敷帝仁皡皡熙熙市肆不移宋鼎已易而民弗知崇德報功王謙讓弗居此天子德威臣何能為古有曹彬於王見之楚國武定公阿爾哈雅於維楚公既勇且武手挺白矛能舂猛虎建謀於廷謂宋疆可平王師出征公實在行陷陳攻城風馳霆轟一駕而襄鄂下再駕而吳楚寧山獠洞貓被毳荷氊亦歸王明士出其門咸為國楨能黼黻皇靈嗚呼楚公蓋世之雄廣平貞憲王王昔倬彼武忠驅猋駕雲來奔真龍無謨不宣無戰不從有孫烈烈徑氣直節雷霆之下孰不殞滅王不震不懾宗藩攝難變生肘腋帝命出師三戰三捷鶴馭上賓衆言沸騰王靜以鎮之神器弗傾玉帶寶衣用旌爾能社稷之臣繄王之倫河南武定王阿珠河南之先世有大勛列陳蟾河強部禠魂三炬夜爇回鶻乃奔乃蹴汴京以洗妖氛西南夷不庭即勒鋭兵以討以征金鼓震天躍入其城縳假智興及生河南沉幾有智挺英毅之氣瞋目一叱萬人皆廢顧彼江南一彈丸之地恭行天誅羽書日馳卒獻馘京師九土茫茫來享來王開元祚于無疆洪陽忠武王伊徹察喇闕三字將一氣之傳有如洪陽不負其先威容言言望之如神親闕三字宿衛帝宸白斥大姦拔去禍根金山之隂蟻附蜂屯王鞠其軍以綏遠人以鎮北門以靖大藩寵賚加厚鑄印如斗大有烈光千載弗亡勾容武毅王托克托呼西北絶域有山峨峨襟帶二河其人鷙猛如闕負戈况我勾容人中之傑來輔真元孰得而遏從大軍北伐應變如神有堅必拔成杭海之烈譬如太阿百錬不折無愧臣節耶律文正王楚材惟楚有材晉實用之逹人先知曰千里駒堂堂中書執政之樞相我太宗拓開鴻基拱立龍庭上陳帝謨三靈協和萬象昭蘇舒吾陽和脫彼翦屠人文褰開民獻爭趍於變時雍上登黃虞厥功何如請視鼎彞楊忠肅公惟中西域小邦以險自嬰帝命楊公往宣威靈雷霆震驚風雲流行孰敢不來庭秉鉞而南椎結卉裳懼不能兵恆山蘖牙盤據大明公仗節而呼巢穴用傾鼎湖遺弓乾綱解結公以兩手上扶日月不欹不昃小大畢逹海外有帝業汪義武王世顯金運之熄亳社已屋誰柵石門巡陴慟哭時維汪王義不負國國亡三秋將焉置力神元龍興六合有赫遂乘剛風來朝帝側出其所藴以效勞績乃截嘉陵乃踐大安乃擒徑帥撤蜀之藩王之出矣提戟而前氣吞三軍王之旋矣雅歌投壺右琴左尊既武且文懿哉元勳張獻武王𢎞範真人開天時乘六龍麾斥八極羣雄雲從劍氣上衝日星晦蒙宋人不恭假息海邦帝命張王汝師汝將汝拔樊襄汝渡大江汝揭義旗以受其降王既受命橫槊上馬鷙擊隼翔有夫甚武直奮大刀衆莫敢當王迎刺之應手斷骯軍氣益揚大聲震天敵有手若亡遂籍其土疆遺爝未息厥勢猶強帝壯王之威復命征征叶音張寶劍名甲錫自尚方一麾而殞海波鏡平叶皮良反崖山蒼蒼武功洸洸劉文正公秉忠賢者在世視時詘信挂瓢武安絶世離羣翻然而起拏風躍雲乃壘乃城乃闕乃庭乃建灤京灤京之封龍岡鬱沖王氣所鍾伊劉公是庸作皇邑土中敷文教萬邦叶容馳車書來同維公之功史忠武王天澤諤諤忠武有力如虎斬將搴旗疾行如飛統諸侯大兵前無堅城馬不留影士不留行梟李擒葛氛䘲肅清凶鷙既鋤殘惸亦寧春生秋殺以奠邦經以嚴邦刑維忠武有勇大敵不恐惟忠武有慈服即弗誅維忠武有節始終弗涅紀功旗常為邦之光亷文正王希憲天啓景運挺生人豪豹略龍韜呼吸風濤英英亷公才雄氣騫力捧濳龍上升九天誕彰皇威關隴晏然廣厦細旃嘉猷日宣出鎮遼霫強宗震疊移節荆湖民氣遂蘇連征大猾正氣烈烈式揚發則莫我敢遏大星煌煌西流于堂天下之傷竇文正公默有倬竇公誾誾而馴雍雍而惇炳炳而文大衣埀紳似不能言及摧權姦執將排山綱常之陳皎若白日照耀天下至今有赫大道既明旁藝亦精九針所及以死為生其學之醇其志之忠宜耄矣之嗟發自帝𠂻姚文獻公樞煜煜龍泉神彩內明視之如空其鋒所指無物不斷其疾如風嫓之文獻雄姿英發靡有不同在前無古在後無今有志卓卓倡道蘇門上泝泗沂下探關洛施於有政蔚為王佐務盡忠諤立經陳紀禮賢黜邪風動四方大開文明輦致雅樂實自魯邦不殺之諌晝夜諄諄舌不得藏治定功成渾然無迹莫窺所存左許右竇三人同心扶乾植坤如帶如礪信誓弗渝永世有聞許文正公衡濓洛之學傅自武夷重徽疊照日星昭埀逮我許公尊聞行知闕若親樞寒泉之麋張皇幽眇釐析毫絲如臯陶淑問畢其情辭如后羿注矢不失其馳既入閫域遂升堂基橫經胄監襟佩鏘如袪其人私牖其天彞釋其偏岐挽其九衢德成財逹昭用于時黼黻帝治甄陶泰熙明體適用公實庶幾無德弗報四海祝尸嗚呼許公百世之師吳文正公澄紫氛蟬聯神物蜿蜒有開必先山川降神自元而貞篤生哲人慎斯勤斯絶乎等夷於道早知厲如秋霜煦如春陽何德之昌抱膝而居氣蓋八區關而弗舒玩心神明操觚弗停興衛聖經學徒是依毛之有麒甲之有龜㪺其淵沖以消吝封心熙氣融大明當軒屢聘益尊施教成均北許南吳先後合符人文之敷董忠獻公文炳伊龍虎君實生羣英一吹一噓霜落變更長江天塹其險莫前公挾二季破浪爭先橫行而捷喜動帝顔戟手指天焦山萬艘櫛比雲浮公大呼突陳蛟泣龍愁橫尸蔽江水為不流淮城雖築敵氣未讋矢石四集貫公臂及脅公拔去之督戰益力韓彭之勇良平之謀方之於公吾不知其孰優郝文忠公經瞻彼郝公上師孔顔挺然一氣立天地間銜命出使仗節弗屈十有六齡有如一日楗門塹垣不翅獄庭臣節甚重萬死實輕吐其崛奇見於直筆姦雄雖亡誅之則力漢有蘇武囓氊海上郝公繼之雙璧相望程文憲公巨夫巍巍世祖度越百王義聲神威撫一宇疆公起佐之仗義激昂咸韶皇度衮冕憲章乘傳來南繡衣焜煌玉札牛溲藥籠並藏出而醫王小大畢張吐握見賢如渴得漿雖居鑾坡不異廟堂以順為明以柔居剛式憲且文於爍其光劉文靖公因先生之心嶽鎮川澄先生之操玉溫石貞先生之學寤寐六經岐陽之鳳魯郊之麟和氣襲人盎然陽春發周孔性情挹其深醇或出或潛與道周旋九京可作吾為執鞭西域軍中獲角端頌我太祖皇帝之龍興也靈承帝命寵綏四方克烈既臣乃蠻攸服遠近諸國往往嚮風內附而東印度遠在西域之陲負固不庭帝乃震怒移六師以征之師次鐵門關之下厥有神物麕身而馬尾獨角而緑文胸人語曰王師宜早還帝因訪問近臣耶律楚材楚材對曰是獸名角端能日行萬八千里其見則惡殺之象殆天使之告陛下邪帝即日下詔班師臣濓謹稽諸傳記角端有二焉其狀類貊角在鼻上中作弓今鮮卑及胡休多國尚或有之其一能曉四夷諸聖在上明達方外幽遠之事始奉書而至此則自周秦以來厯千餘年之久絶未之聞而獨于神元見焉豈非聖德有以動天靈異之物莫不自至也歟漢元狩初武帝行幸雍祠五畤獲獸一角而足有五蹄協律都尉李延年及司馬相如之流尚竭其心思播諸樂歌千載之下令人讀之有若親生其時而觀其事者矧今之所獲古所未有使延年相如輩得際今日休明之治則其咏歌聖德於無疆者又未知其何如也臣濂雖不敏其可已於辭乎謹拜手稽首而獻頌曰於赫太祖肇基龍荒手持黃鉞日靖四方飈飛雲流無敵弗剪孰敢不恭以貽誅獮維彼印度疏勒之西敢抗六師大命卒迷帝乃震怒爰飭其旅爾禡爾牙爾桴爾鼓龍旗載揚列星以光指于西疆白日為黃乃有神獸麕身馬尾獨角桓桓人立而語帝詢近臣厥獸何靈近臣有言角端其名天子好仁奉書而至曷釋戈矛綏以文治帝曰俞哉我師亟還爾弓則櫜爾矢則鞬有聲鍧鍧震撼四國埀衣龍庭化行絶域九有之臣原闕載呼天地動色神人其愈惟我太祖祗承上帝帝度其心純一不二惟我太祖乃武乃神戢暴遏劉綏我下民惟我太祖恪慎天戒曾不移時戎車返斾神獸之來自天降祥匪天降祥惟帝之昌孰其嫓之古聖有作龍馬出河神龜浮洛黃支之犀九真之麟何世不有匪德之因皇靈赫奕覆冒下土魚鱉咸若鳥獸率舞曷其基之自兹始之茫茫八樞莫敢不來唯德動天薦兹嘉瑞小臣勒辭永貽世世天台教宗圓具頌三千性相百界千如此天台教觀第一義也有能於此悟入融萬法而師一心即一心而達三諦其近於佛之知見乎比丘法咸示濓圓具圖像於是合掌作禮而説頌曰我觀妙境不思議三千性相恆宛然心佛衆生本無二不為迷悟有增減大充法界小塵沙一一具此無量法須知一念即三千三千一念亦如是譬如空懸十寶鏡鏡前然一光明燈一燈遍入一切處一切振歸一燈內光光涉入了不礙互遍互融無盡藏此境即空即假中而亦不落空假中非先非後非異時舉一即三三即一事理俱攝無差殊修性齊照亦不别五佛開顯大車譬只此一乘圓具旨若祗觀心不觀具乃以一觀分二家或約三諦作二造有昧圓融祕密義妄真染淨無異觀是非能所亦雙泯遍虛空界盡法身一法外求即邪道惟此如來正法門有非語言能擬議大海可飲風可捕厯劫讚嘆莫能盡書擬答魏錡絶秦書昔我嬴秦實長西戎獻公不我鄙夷以伯姬歸我穆公穆公不敢忘獻公薨國內不靖羣公子出奔穆公懼大國社稷之隕會齊人納惠公于晉惠公許以河外列城五東盡虢略南及華山內及解梁城言猶在耳乃即背之會晉荐飢來乞糶於我諸大夫惡惠公二三其德也欲乘飢伐之穆公則曰其君是惡其民何罪於是乎輸粟于晉自雍及絳相繼不絶未幾秦亦飢穆公又曰晉君其能恤我民矣乎遣使之晉惠公弗念穆公之施絶而弗與穆公不得已有韓原之師相從惠公而西雖然豈敢以至即改館饋七牢焉使歸于國及晉再飢穆公又餼之粟惠公薨懷公遣師軍于廬柳威靈所加孰不畏之我穆公忘己之弱使公子縶如晉師天誘其衷退軍于郇文公遂入曲沃朝于武宫吕郤畏逼將焚公宫以圖不軌穆公知之乃潛會文公于王城誘而殺之文公即位來逆夫人嬴氏穆公以晉國大臣未附俾三千人衛之以歸微我穆公惠文之能有國未可知也則是我有大勳于晉豈惟諸侯知之皇天后土實與聞焉文公當不忘我舊德戮力同心以輔王室子帶之亂天王出居于鄭使左鄢父來告難亦使簡師父以告于晉我穆公左執鞭弭右屬櫜鞬親帥師屯于河上以逆文公文公恐我分其績也乃辭我師而下納王于成周殺太叔于隰城而獨受陽樊溫原攢茅之田我穆公不敢言文公自是信宣於諸侯虞夏商周之胤莫不震疊相率而朝于晉非為秦也文公又以諸侯方睦欲修舊怨于鄭穆公畏文公之威不能自寧急出師軍泛南鄭伯恐使燭之武來言曰君嘗為晉君賜矣許君焦瑕朝濟而夕設版焉君之所知也夫何厭之有既東封鄭又欲肆其西封若不闕秦將焉取之穆公聞其言而懼結盟而還文公薨襄公即位穆公有事于鄭未嘗以一矢犯晉疆場襄公蔑棄我穆公以墨衰即戎敗我于殽殄殱我卒徒係纍我三帥我穆公亦不惟晉之怨乃自悔過誓告於羣臣然猶徼靈於惠文以事我襄公襄公不察我之誠又帥宋陳鄭三國之師取汪及彭衙國中之人怒曰晉不報德則已乃日事干戈是欲滕薛我也將悉索敝賦以待于郊亦冀晉人遣一介行李之來修復舊好襄公唯力是恃又伐我圍邧新城襄公薨穆公亦即世晉人以國家多難欲立長君使先蔑士會如秦逆公子雍我康公唯穆公之事是效多帥徒衛以納之晉人遽食前言而立靈公又敗我于令狐自時厥後又取我少梁又戰我于河曲康公薨共公即位靈公亦悔于厥心欲求成于我又不明言以侵崇急我共公惡其詭道弗敢與成靈公薨景公即位景公不務撫綏秦民又迫我于輔氏景公薨君嗣厥位寡人謂二三大夫曰我兩國匪以玉帛相見而以興戎寡人之恥也盍行成乎君亦降心相從會于令狐而盟于河之東西口血未乾又使魏錡乞師乎魯欲以伐我且以蔓辭以文致我罪寡人聞之困獸猶鬬况國乎君既有意督過矣寡人亦何愛一國士卒不與君周旋左右乎君若惠顧前好唯令狐之盟是申是尋亦唯命煆乃戈矛備乃弓矢俾兩君相見于野亦唯命寡人敢帥西方之諸侯俯伏以聽唯執事其進退之五氣大有寶書陵梵騫辰五氣大有寶書為句曲外史陳太虛作太虛性好道合丹鶴臺澗中聞余嘗究大洞真諸部書求發其祕豫因攬精搴華為辭五章托于中黃靈君序以告焉然而語各有微意皆有寓太虛慎覽之則玄玄之道畢矣序曰玄元浩劫龍漢開天中黃靈君三景之尊運動玉樞道合大始神化玄幽莫知其幾據白霓坐敷演妙音陵梵騫辰分合五氣五氣鬱勃凝為天章九始東氣龍文流玄瑶華洞陽王都回先太黃開清二象淵通空清淨霐上炙五衝三微南氣神文委精堂曜煥户觀明啓庭八都録圖十澤應徵上下蓊蓂神駕肅征七華西氣策文命基象極載御璇房薦釐天元危宫六天上書寒靈之府日闔以舒五威北氣皇文馭剛孝芒宸居梵度翕重鬱隂絶密明都皓良泉曲宵臺煜煜吐陽一元中氣王文養和上無宛黎下爽龍阿虛皇玄老於此嘯歌神母亭毒萬有乃多青赤白黑從橫糾錯黃氣間中八角布耀景靈散煥潛運勃英堪輿停輪日月避舍郁紛紛羅光遍璇極元陽玉匱九靈玄篇大有寶書實垂玉簡飛玄上闕惟耀魄寶或靈威仰或赤熛怒或白招矩或協光紀或含樞紐晝夜動行遊神黃寧朱熾下藏玄冥上升凝合妙真洽于太神與道為祖周流入津羅明皇真濛翳大神龍變巴元劫仞之神元康和陽出入七門神風流煙歸于無明無方無象無景無聲無兆無朕無幽無明廓落單鬱皇朗流泠大微扈衛紫垣鬯英可以度世可以延齡可以閼邪可以辟兵藏之金室龍鬼守扄勿授下士以褻我天經焉東方延藍渺鬱康彌浮皇洞真青氣九始龍文太清混微天一芽至神旁魄飛九遐靈腴上浮三素遮神霄赤明生玉葩陽林褰開洞真過紫充藏胞暈幽霞帝真𨗳肥上範和翠玄交象胚輪華化生無方正不邪生生不恤年劫多南方帝漻禪育郁羅乾那洞神赤氣三微神文太明開景標朱陵大化坱圠物以神星馬在皂鶉吻伸絳泉上捲華池津梵英公子司炎垠華闕陽堂風火輪自然玄照符明真繁想刋落曜中根遙翰輕迅上天閽赤混寶瀣資精元西方皓凝飛玄雍觀龍炎洞精白氣七華䇿文太素皇梵楊金晶白藏御序肅五兵空洞浮寥玄極并散華潛收哺飛明紫陽瓊蕤割辰衡旋關起爽歸元瓔嘉穟還結真一庭泰玄左右棲八靈昏昏默默中有精須延勿使霆鬼偵北方爽朗兜術大演瀟圖洞明黑氣五威皇文太冥浩阿君四濛清泠使者都大宫王靈玄胃四日彤纒以長它澀欲封寒庭幽閨壓羅鄷雙館陰閉關元通騫爽回翳神自雄浮遊反命藴沖容離羅來居百霛從出入三際應無窮中央阿奕流華曜駕回歘洞靈黃氣一元王文黃房淵玄圍中規懸空特立無東西虛元煥落含浮黎中扄束紐北極齊神輝旁射嬰素霓太乙流珠混若臡黃寧練胎元命稽隂陽大分和天倪鬼户闖人日嘯啼至士聞道當勿迷記太乙玄徵記金華宋濓賦質甚弱十日九疾生産作業之事皆力有所不任唯日學操觚造為文章精思弗得罷極就寢夢一老父白髮鬅鬙與雪鬬潔身被黃服手支青藜杖徐徐而前招濓謂曰若何疲思之甚邪吾乃太乙之精在皇漢時曾降天祿閣以洪範五行授劉向若今意有何圖第言之吾當有以處若也濓再拜曰下土蟣蝨臣不自料得接休光以沐浴神化亦既幸矣復不以臣之微賤使吐其情辭雖無知敢不精白一心以承靈貺臣受氣于天孱弱而蒙庚戌之歲律中應鍾日在于氐地寒以風母妊七月臣體即降生未五齡百疢交攻熱火鬱木邪沴制陽肝風動搖手牽目瞪謁醫視之謂為瘛瘲毒艾焮膚其苦莫膺雖脫于虎口筋骸弗強有牛負軛有鏄在場力既弗任田卒薉荒幸有書一束塵齧蠧戕振拂驅剔以佩以藏以嘬以嘗以求其方疲精竭思攻為文章窮年矻矻恆不知變更太乙曰吾聞心有所溺者必有所甚樂也若之所嗜如是將樂之邪抑弗獲己也濓曰臣為文之時獨潛闔廬五官內守形若橛株凡慮既澄運思希夷上升層霄下入重壚絪緼庶彚彌布大區自形自色匪可數知一一攝之若禽在笯若獸在周阹縱健距捷羽曾不得離其範圍及夫意暢氣熙與神合機嶽蕩河翻雷椎霆驅倐爾隂合歘然陽施鬼出電入載正載奇萬化千變莫窮端倪雖身執台樞腰懸金魚膳羞熊蹯居飾璇題入則麗姝吹竹彈絲出則戎士負弩曵旗亦不足以喻其適臣實樂之初非有弗獲己也太乙曰若樂則樂矣古之人亦有業是者乎濓曰有之雖更僕不可盡也請陳其略昔有巨儒曰太史遷豪氣孤騫濶視無前執筆著書動數萬言祕之金匱及藏名山至今文光上燭九天董生三策揚雄太玄相如大人退之五原若修若軾若鞏之賢各有論著焜耀後先虎鳳騰躍韶鈞相宣汗瀾卓踔盤紆蟬連業之既專厥功乃全其功何居而磨研之耔之穫之湘之瀹之炊之酌之使心樂之一日不治若芒刺肌六氣昏昏精神不來由是觀之古之人所業其亦有以哉太乙曰嘻若言陋矣知冠角􅏋胡之為象而不知辨冕纓緌之制知糗飯藜羮之為美而不知淳熬肝膋之味知吳歈楚豔之為曲而不知夏濩武勺之音若言陋矣濓於是憮然自失膝行而進俯首至地且拜且祈曰臣不佞竊受教於先生長者學文二十餘年自意已造其極不知猶未也夫井魚固不足以語天夏蟲固不足以語寒幸察臣之誠憐臣之愚授臣以要道使臣聞之雖即死無憾太乙愀然不答濓復殷勤致辭俯伏俟命歷一時之久太乙三嘆而後言曰上堪下輿惟人中居厥初茫沕夢未有知野鹿標枝蚩蚩狉狉聖人者出扶弼教基揭我日月燭我冥馗所謂建生民極立天地心者是不有其道歟道雖無形揆文可知典謨渾淳卦畫閎奇雅頌恢張禮樂威儀春秋謹嚴衮褒鉞誅不由於此去道遠而舍其根荄玩其葩葉而何以史遷諸子為且非文不行非文不章天子非文曷風四方諸侯非文莫守其邦卿大夫非文身鬱不揚士庶人非文卒遏于鄉故云文者乾坤之粹精也隂陽之靈和也四時之衡石也百物之銛鍔也中國之采章也四裔之儀法也可不務乎彼辨博馳騁以邪奪正是誣世也卑辭甘言藉威取寵是媚權也佞墓受金是非舛繆是罔利也氣亡魄喪懨懨不振是萎薾也抽青嫓白眩人耳目是聾瞽也若此者弗可枚舉其文乎哉其文乎哉吾前之所謂文則異於是矣充於一身和順內積英華外發逹于四國民物阜康政教鬯洽筆之於書則可為天下後世法傳曰有德者必有言若之志勤其亦慎所學哉言訖四方晦冥飊風上行仰視天門如有火光反而顧之太乙巳亡濓驚而寤不知其為何祥也乃召日者占之日者端櫝出蓍左右揲之挂而扐之遇復之離曰是謂後得而先迷百折旁坂倀倀安歸雖車堅馬肥終九顛而十隮或道之於崇期載旌以驅歷國通都膳宰致餼司里授廬不亟不徐直抵夫玄聖之所居蓋復者不遠復也而重離又文明之象也此殆示子學文充微乎濓於是惕然悟悉燔毁筆硯取六藝燖溫之未幾學果進浦陽善應精舍記我大雄氏説法度生凡其住處衆所依止以是因緣成大蘭若黑風飄船舫流入羅剎國軀命不能保此以何因緣蓋為貪欲故由貪漸滋蔓業障永不淨我今建梵居皈依大悲入幡蓋及床坐一一盡莊嚴藉是象教力欲捨諸所有所有既空故空空亦無有譬如大圓鏡中放無量光不去亦不來不內亦不外如如屹不動隨物悉現形茍涉世間相執此有漏因何以能出離汝等比丘衆當聽我所説於一剎那間成此無上道玉壺軒記玄黓攝提格律中夷則白月流天牽牛正中商飊襲人仙華羽客凝神黃宫忽翛然遐征西至灕縈之山其山髙三百五十有八丈而翠河之水出焉其陽多玗琪樹多瑶草多嬰垣之英赤蕤而素莖皆生玉榮其光熊熊其氣魂魂其隂有五華之木産實如櫻丹腴而長毫其埀屯屯膠膠神麟炎尸之厥容類蚪枳首而六眸其音如榴山河之間有洞房焉中外純素圓若嘉瓠太灝流晶以雪為城見費仙人從一老父酣觴其中寤而思之不知何祥也於是以歸藏筮之遇乾之離其繇曰至象有容豁落無隅渾淪中苞西華流儲超乎元素造物之初有玉壺之象焉已而遊句曲洞天望積金峰北雲勃勃如練起谷中散為五色霞東去乃指曰是必有異因躡屐尋之一室皎然宛如神遊所覩者有仙翁年七十餘冠緑璈之冠被三真朝斗之衣欣然出速豫往與之楫且告之故仙翁笑曰若子所言乃蒙莊所謂外而不內者也子曾謂吾之玉壺果在此耶溟涬之先忽荒眇綿洞明兩極混合上玄大如忝珠含乎方圜然猶以迹言也况乎大道無名主宰萬彚鬱紛羅森有不出是壺之外者是何也至人以白為室以圓為家以虛為質以潤為華子曾謂吾之玉壺果在此耶仙華羽客瞪然視愕然驚曰費仙人之從飲者無乃翁也邪吾向所見灕縈之山翠水之河不其涉幻化耶幻隱而真始顯邪仙翁不答笑而去問諸左右仙翁姓蔣名應琪金壇人海雲先生弟子通玄學兼究孔墨諸家言金陵學道之士恆推為巨擘云釋氏護教編後記西方聖人以一大事因緣出現于世自從鹿野苑中直至於跋提河演説苦空無量妙義障機鈍利分為頓漸無小無大盡皆攝入薩婆苦海既滅度後其弟子阿難陀多聞總持有大智慧結集為修多羅藏而諸尊者或後或先各闡化源優波離集四部律謂之毗尼金剛薩埵於毗盧那前親受瑜珈五部謂之祕密章句無著天親頻升知足天宫咨參慈氏相與造論發明大乘謂之唯識宗旨西竺龍勝以所得毗羅之法𢎞其綱要謂之中觀論燉煌杜法順深入華嚴不思議境大宣玄旨謂之華嚴法界觀毗尼之法魏嘉平初曇柯羅始持僧袛戒本至洛陽而曇無德曇諦等繼之立羯磨法唐南山澄照律師道宣作疏明之四分律遂大行是為行事防非止惡之宗薩埵以瑜珈授龍猛猛授龍智智授金剛智唐開元中智始來中國大建曼荼羅法事大智道氤大慧一行及不空三藏咸師尊之是為瑜珈微妙祕密之宗唐貞觀三年三藏玄奘往西域諸國會戒賢於那蘭他寺因受唯識宗旨以歸授慈恩窺基基乃網羅舊説唐制疏論是為三乘法相顯理之宗梁陳之間北齊惠聞因讀中觀論悟旨遂遙禮龍勝為師開空假中三觀心觀法門以法華宗旨授慧思思授天台國師智顗顗授闕頂頂授智威智威授惠威惠威授玄朗朗授湛然是為四教法性觀行之宗隋末頓以法界觀授智儼儼授賢首法藏至清涼大統國師澄觀追宗其學著華嚴疏論數百萬言圭峯宗密繼之而其化廣被四方是為一念圓融其德之宗瑜珈久亡南山亦僅存其盛行于今者唯天台慈恩賢首而已此則世之所謂教者也世尊大法自迦葉二十八傳至菩提達摩達摩悲學佛者纒蔽於竹帛間乃𢎞教外别傳之旨不立文字而見性成佛達摩傳慧可可傳僧璨璨傳道信信傳𢎞忍忍傳曹溪大鑑禪師慧能而其法特盛能之二弟子懷讓行思皆深入其閫奧讓傳道一一之學江南宗之其傳為懷海海傳希運運傳臨濟慧照大師義玄玄三玄門策厲學徒是為臨濟之宗海之旁出為溈山大圓禪師靈祐祐傳仰山智通大師慧寂父唱子和微妙玄機不可湊泊是為溈仰之宗思傳希遷遷之學湖南主之其傳為道悟悟傳崇信信傳宣鑑鑑傳義存存傳雲門匡真大師文偃偃之氣宇如王三句之設如青天震雷聞者掩耳是為雲門之宗玄妙師備偃之同門友也其傳為桂琛琛傳法眼大師文益雖依華嚴六相唱明宗旨逈然獨立不涉凡情是為法眼之宗遷之旁出為藥山惟儼儼以寶鏡三昧五位顯訣三種滲漏傳曇晟晟傳洞山悟本大師良價傳曾山元證大師本寂而復大振是為曹洞之宗法眼再傳至延夀流入髙句驪仰山三傳之芭蕉徹當石晉開運中遂亡弗繼雲門曹洞僅不絶如線唯臨濟一宗大用大禨震蕩無際若聖若凡無不宗仰此則世之所謂禪者也嗚呼教之與禪本無二門依教修行蓋不出於六度梵行而禪定特居其一由衆生根有不齊故先佛示化亦不免有異耳奈何後世各建門庭互相盾矛教則譏禪滯乎空寂禪則譏教泥乎名相藉藉紛紛莫克有定是果何為者邪此則教禪異塗猶可説也自禪一宗言之佛大勝多與逹摩同學禪觀逹摩則遠契真宗勝多所見一差遂分為有相無相定慧戒行無得寂靜大門非逹摩闢之安能至今廓如也慧能與神秀同受法于𢎞忍能則為頓宗秀則别為漸宗荆吳秦洛各行其教道一神會又同出於能者也道一則密受心印神會則復流於知解一去弗返而其末流若大珠明教慈受輩尚何以議為哉自教一宗言之慈恩立三教天台則分四教賢首則又分五教粗妙各見漸圓互指終不能歸之一致可勝嘆哉此雖通名為教各自立宗猶可説也自夫本教之內言之律學均以南山為宗真悟智圓律師允堪著會正記等文識者謂其超出六十家釋義之外何不可者至大智律師元照復别以法華開顯圓意作資持記又與會正之師殊指矣不特此也四明法智尊者知禮孤山法慧大師智圓同祖天台同學止觀真妄之異觀三諦之異説既已抵牾之甚霅川仁嶽以禮之弟子又操戈入室略不相容諫書辨謗之作逮今猶使人凛然也其他尚可以一二數之哉嗚呼毗盧華藏圓滿廣大遍河沙界無餘而餘非相而相非緣而緣非同而同非别而别茍涉思惟即非聖諦又何在分教與禪之異哉又何在互相盾矛業擅專門哉又何在操戈相攻遽背其師説哉雖然適長安者南北異塗東西殊轍及其所至未嘗不同要在善學者慎夫所趨而已比丘永夀嘗以閩僧一源所著護教編示豫自大迦葉至于近代諸師皆有傳贊文辭簡古誠奇作也夀獨惜其不著教禪承傳同異之詳屬豫為記以補其闕略豫因以所聞疏之如右文繁而不殺者欲其事之著明蓋不得不然也序送慧日師入下竺靈山教寺受經序西竺之書動數百萬言雖其廣博漫衍若大海杳無津涯其義趣未嘗不著明剴切可以習而通之自判教諸師各執一説甲是乙非學者始不知夫所趍矣天台智者國師以五時八教判東土諸經五時則華嚴鹿苑方等般若法華涅槃也八教則頓漸祕密不定藏通别圓也其規模宏深節目森嚴可謂盡矣至真諦三藏則不然以涅槃等經為漸華嚴之經為頓頓漸之外别無他也新羅元曉復造華嚴疏分四教四諦緣起為别般若為通瓔珞梵網為分華嚴為滿滿則一乘别通分則三乘也吉藏師復立三法輪教華嚴為根本法輪三乘等説為枝末法輪法華為攝末歸本法輪法輪言其流轉而不息也自時厥後以釋迦為屈曲舍那經為平道者此二教乃江南印之所建也以四阿含為四諦般若為無相華嚴為觀行涅槃為安樂大集為守護者此五教乃波頗三藏所説也以阿含等為四諦相大般若等為隱密相華嚴等為顯了相者此三時教乃三藏奘及慈恩基依解深密經所立也而賢首法藏復尊華嚴立為五乘初為愚法小乘二為大乘之始三為大乘之終終始二教並依地位漸次而成四則為頓不階等級一念弗生即入覺地五則為圓一即一切一切即一是為真俗互融具是圓滿無礙法門長者李通玄又别分為十時始為小乘有教為諸凡夫繫著世法以為實有還將有法轡勒彼心次言般若破有明空次言解深密經和會空有令其不滯一邊不有不空次言楞伽明假即真次言維摩即俗恆真次言法華引權歸實次言涅槃令諸三乘捨權向實次言華嚴於剎那際通攝三世圓融盡入一際次言大乘人天三乘雖是同聞得益皆别名共不共次言華嚴會中十方菩薩其來不同共會説法名不共共如是教相離析尤繁然猶據教觀而判之初不若近代寧師合禪教祕密而混言之也寧師以諸乘經律論而祖摩騰曰顯教輪以瑜珈灌頂五部護摩三密曼拏羅法而祖金剛智曰密教輪以直指人心見性成佛之言而祖菩提逹摩曰心教輪其言非不佳而去佛之意益遠矣判教諸師家異説而人異論其紛紜有如此者嗚呼為釋子之學者不既難矣乎然不敢以此而遽少之也原其立教皆為對機機有不同教亦多種譬大醫王方便治疾疾有實虛針有補㵼隨其所見因時制之茍執于一為害滋甚彼諸師者亦復如是或遂以甲是乙非咎之不已過乎雖然九師興而易道微三傳作而春秋散吾儒且爾豫又不得不為學者懼也今日師久遊方外以教乘之不易明將往大叢林從碩師而受其説聞豫頗究內典求片言以為贈豫言贅矣一真法性本自圓明其可以語言文字求之哉豫言贅矣序俞神君靈迹神君姓俞氏不知其名與州里所居相傳唐未時來勾吳主上林里吳嫗家以播鼗鬻笄珥為事出言隱顯不常頗類神鬼語或張蓋行赤日中必雨否則雨雖甚必霽近楓橋十里所有溪善溢咫尺若千里涉者告病神君釋芒蹻擲之後遂涸性喜篸柳幘間手植園蔬一夕亦盡化為柳人異之呼為柳仙人云閲三載忽謂嫗曰吾乃柳星之精被謫來人間期滿當逝即逝毋棺我合二甕瘞之山椒他日廟食勿用犧牲為薦吾將利爾後人也嫗從其言瘞畢土人畬山火誤延其家時方長夏俄有積雪數寸覆之人益驚異相呼作新廟凡水旱及螟螣害稼厲鬼為凶災咸奔走神君熙寧中郡守以事謁廟下舉觴奠酒且再拜及興觴已竭復勺中分而亡其半餘酒若墻峙弗傾宣和間方臘作亂聲搖浙東西惡少年欲嘯衆從之神君降于巫曰上帝檄吾帥九天神兵破賊此曹宜速改弗改必令作虀粉未幾人自衢來言賊聞瀟瀟風水聲疑有鐵騎百萬自天而下咸棄戟遁官軍遂平之紹興初髙宗駐蹕會稽監察御史婁寅亮銜上命請雨致辭未畢天大雷電以風雨隨至神君於雨暘若果司之者他有禱輒應類此而烏傷大雄二事尤異十三年夏不雨諸暨縣令輦神君像于大雄佛剎祈焉始至日焰焰欲然少則片雲當空飛雪著瓦有聲雪止雨即澍烏傷有數豪右田相環約同請神君雨一不從曰吾田幸居中豈有上下沾潤而弗及者神君戲之獨弗雨其田士人張漙隨計上禮部以夢卜得失神君報之驗甚由是遠邇敬畏尊之視天神非齋戒不敢入或御葷肉故慢神君者多嘔血死蓋神君不近腥穢廟前有小澗至今魚鱉不敢入云史官曰天厯初余在外姻賈氏家見象二龍致雨弗驗即往號諸神君居亡何雲潝然興轉旋如車輪雪花飛舞空中已而大雨明日又雨不號神君者雨固弗及也余竊神之及來勾吳聞薦紳先生言知神君加詳因趨上林謁神君祝史道豫至瘞甕處有樹二章紺澤若新沐世傳舁翁之木所化隂風猶冷冷動人學者多疑於鬼神若考神君之事可不信乎傳言五星之精能下化為人嗚呼非獨五星然也宋景濓未刻集卷上
