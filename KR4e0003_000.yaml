body:
  text: 宋景濓未刻集别集類五明提要臣等謹案宋景濓未刻集二巻明宋濓撰濓集重刻於嘉靖中行世已乆此本乃國朝順治乙未濓裔孫實穎得文徴明家所藏原刻舊本以示金壇蔣超超擇其中今本所未載者得三十八篇編為此集以補其遺今以嘉靖中韓叔陽所刻重勘其中跋何道夫所著宣撫鄭公墓銘等十一篇皆今本所已載超盖檢之未審其餘二十七篇則實属佚文推究當日之意盖或以元代功臣諸頌及誌銘諸篇大抵作於前朝至明不免有所諱或以尊崇二氏不免過當嫌於躭溺異學而隠之觀楊士竒東里集倪謙文僖集凡文章為二氏而作者並别為巻帙附綴末簡不散入各體之中則正徳嘉靖以前士大夫之持論可大畧覩矣然古來操觚之士如韓愈之於髙閑文暢持論始終謹嚴固其正也至顔真卿書多寳塔碑撰麻姑壇記於平生大節要亦無虧厯代文集此類頗有固未可以一端論也觀是集者知其持論之失但以文章取之可矣乾隆四十五年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:6c01c5e1f0a7a74b2115db72c26bacbd0310e6eed3cb87e89bcadccee12b202c
