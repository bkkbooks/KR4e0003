body:
  text: 宋景濓未刻集别集類五明提要臣等謹案宋景濓未刻集二卷明宋濓撰濓集重刻於嘉靖中行世已久此本乃國朝順治乙未濓裔孫實穎得文徴明家所藏原刻舊本以示金壇蔣超超擇其中今本所未載者得三十八篇編為此集以補其遺今以嘉靖中韓叔陽所刻重勘其中跋何道夫所著宣撫鄭公墓銘等十一篇皆今本所已載超蓋檢之未審其餘二十七篇則實屬佚文推究當日之意蓋或以元代功臣諸頌及志銘諸篇大抵作於前朝至明不免有所諱或以尊崇二氏不免過當嫌於耽溺異學而隱之觀楊士竒東里集倪謙文僖集凡文章為二氏而作者並别為卷帙附綴末簡不散入各體之中則正德嘉靖以前士大夫之持論可大略覩矣然古來操觚之士如韓愈之於髙間文暢持論始終謹嚴固其正也至顔真卿書多寶塔碑撰麻姑壇記於平生大節要亦無虧厯代文集此類頗有固未可以一端論也觀是集者知其持論之失但以文章取之可矣乾隆四十五年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c8693aa20dd65128d10868912623388c62d9731abe158bcc3decb9e4d5be89ea
