body:
  text: 宋景濓未刻集卷下明宋濓撰碑銘元故亞中大夫撫州路總管張君墓碣銘君諱仲儀字伯威張姓綘陽人以大官薦由綘學正入翰林為書寫改户部令史出為江西行省掾俄入掾中書用年勞遷寶鈔庫副使階承直郎調奉訓大夫杭州路總管府判官杭為東南一都㑹臨以省憲二府卒有事左牽右綴若未易爬梳君處其間不吐不茹上下藉藉稱之曰能吏能吏云海寧潮溢民田廬多沒君憂之以特牲禱於海神曰民非田不食非闔廬無以居神忍化為魚鱉宫耶即為魚鱉宫神亦將何依吾恐神不自寧也神如識我語良海波當帖帖禱畢親沈石水中命健卒千繼之未幾復海為地升奉議大夫兩浙都轉運監使司判官轉奉政大夫江西等處行中書省左右司都事豫章歲凶民掘野鼠食餓莩橫道因聮裳為旗執棘矜集城下將為變衆憚不敢往君單騎出呼曰爾等寧饑死可血死乎我張都事也敢害者前敢害者前民皆泣拜散去君還言於省臣大發倉廪賑之賴以活者萬數蕭鄧二大姓以武斷自豪州縣踵門受事顔色小異輒縮縮不敢進小民重足立戒毋敢高聲語君皆捕治于獄聞者刺羊豕相慶曰吾屬臥始安枕矣擢亞中大夫撫州路總管年始六十有八至官一月即喟然嘆曰顛毛已種種尚可仕弗止乎當從天子丐我婆娑太隂山間以沒餘齒耳遂上休致之請掛冠徑歸越一年卒至順癸酉十月十日也君藏書數千卷翻閲不輟上馬入公府亦銜置袖中人譏以蠧書蟫搖首笑不應曾祖諤金明昌中舉進士登第官至朝請大夫吉州刺史聲號赫然祖和抗節不仕父筠以君貴贈奉訓大夫同知河中府事飛騎尉追封正平縣男元配郝氏再配陳氏皆封清河郡夫人子男三曰栵早世曰柞奉政大夫紹興路餘姚知州曰棫廣州路增城縣尉女二孫男一柞以某年月日葬君某山之下銘曰於戲乎君其仕也振振其止也誾誾是惟有元能吏之墳於戲乎君麗水二賢母墓碣銘麗水有二賢母一曰周夫人元靜一曰龍泉縣君徐淑夫人適同邑林府君侑縣君歸府君之子宋鄉貢進士今纍贈祕書監丞周夫人知攻書旁愛道術家言嚴齊戒以事神明奉其姑周氏曲盡孝養主饋非鑿御弗之進縣君賢甚養夫人亦如之至元丙子江南內附秋九月兵入括縣君生新州守定老甫六月祕書君急負之竄大澤中游騎追及射之遂棄新州馳入民廬以終夫人與縣君辟地東山聞變挾媵人間行蹤跡之又遇兵麾夫人却而追縣君東行婦姑相持慟曰同歸九泉爾終不能茍生也夫人計無所出乃號諸神曰神奈何絶我子既兵死孫又棄中野獨一婦存忍使其顛連乎神奈何絶我俄而兵目眩似見負裝槖行者持㦸趨奪之婦姑乃翳灌莽亂走偶過澤中則新州在地弗怖弗啼媵人愕曰兒在矣兒在矣亟腹以去兵既退抆淚跡祕書君收骨還家家已破姑婦相依為命僦舍宇以居瓦罈敗帷淡然能自安縣君年始三十三歲說其再行縣君指新州泣曰林氏數十世相傳唯此子爾無此子林氏之鬼且不血食妾何行如之天若未割林氏幸此兒成立異時持酒一觴滴府君冡上土俾鄉人咸曰林氏有後妾即死目亦瞑人義之不敢復言新州幼多病二母保護如嬰垣之玉惟恐壞之新州知二母意亦深自刻厲以文行稱用部使者薦教諭松陽繼擢延祐辛酉進士第四轉而至今官階中順大夫命書焜煌貤贈父母人皆以為榮初新州在布衣甚貧鄉先生潘架閣弼時方貴盛獨奇新州欲以女歸之長女辭次女妙貞曰從父命爾妙貞遂妻新州荆叉練裳提甕出汲猶寠人然其奉縣君猶縣君之事夫人縣君嬰末疾不良於行或啓或處晝夜恆負以從疾且革刲股雜淖藥以進乃瘳妙貞從新州宦遊三十年亦纍封如夫人生四子端夭誠祖博通經史諸家之學以廕補官至某階建寧路松溪縣尹彬祖至正乙酉進士纍官從仕郎江浙等處行中書省左右司都事似祖癸巳鄉試第一上禮部不第恩授處州路儒學正誠祖子三公慶甲申鄉貢進士慶元路儒學正公庠公亷處州路儒學録彬祖子三公縉公繹公緩似祖子五公興公質公異公贊公實夫人之父某宋某官縣君之父某宋某官皆括之巨族縣君夀六十三卒于大德甲辰九月二日夫人年八十一卒于乙巳九月二十二日後縣君僅一歲以丙午七月四日同葬縣西元和鄉之蒲潭嗚呼世多孫子者有之多而又賢則罕也多而又賢者有之賢而能文則罕也賢而能文者有之能文而中進士科則罕也中進士科者亦有之至於連翩起於一門之中則罕之又罕者也原其所以致是果誰之力歟實二賢母造之也譬之藝櫟保之于一髮之微馴至於百圍之大使支條敷腴而還廕其本根二賢母有功林氏者為不細是宜揭德墓門以詔林氏萬子孫知有所自銘曰惟林氏世簮纓時傖囊家罹兵一髮存有遺嬰鷇哺之訖于成由甲科居専城問四馳穆而貞施厥後何繩繩踵前軌振翹英畜之深發必𢎞日焜耀砰以訇蒲之潭妥幽靈廓其潛勒兹銘元故榮祿大夫陜西等處行中書省平章政事喀喇公神道碑銘代黃侍講至正元年五月二十有八日故榮祿大夫陜西等處行中書省平章政事喀喇公以疾薨于京師之私第享年五十有一某月日其子某即奉柩葬于宛平縣東安先塋之次後十有六年始奉門生楊迪所為狀不遠五千里俾某勒銘於神道之碑某自退休以來志念凋耗疾病侵凌凡以文來謁者率皆謝絶重念昔嘗待罪太史職在論撰公之行能勞烈實應銘法又不敢以衰耄為辭謹考次而銘之公諱回字子淵世為喀喇部大人族喀喇古髙車國也我太祖皇帝親征而略定其地故其國人往往來效勳庸以致顯榮若公家其一也曾祖哈里巴贈光祿大夫某官柱國追封河東郡公妣䝉古某氏追封河東郡夫祖雅濟克贈推誠寅亮一德翊運功臣太傅開府儀同三司河南江北等處行中書省左丞相上柱國追封晉國公諡忠獻妣金氏追封晉國夫人考博果密昭文館大學士榮祿大夫平章軍國事行御史中丞領待儀司事贈純誠佐理同德翊戴功臣太師開府儀同三司上柱國追封東平王諡文貞妣冦氏追封魯國夫人王氏追封魯太夫人初文貞嘗從許文正公游親傳其正學施于有政蔚為名臣故公自幼習聞家庭之訓於經史精微政治得失多所研究業既成以大臣子宿衛禁中成宗嘉其寅畏從臺臣之請命公為集賢學士以年幼辭不受大德末復用薦者言擢公朝列大夫太常少卿先是膰肉之頒無法臨事多紛紜有力者恆負之而去公為立契勘以定其數小大百司依數致膰朝廷為之肅然轉太常卿進階嘉議大夫未幾改寺為院升公為使公辭武宗正位宸極人情未安乃選藩邸舊臣出使四方以布宣威德唯公所歷最遠復命最先上悅深被奬眷盜發海濱有梗漕運丞相議設康里衛分鎮其地且命公為寓户公曰弭盜在用賢不必設衛分屯以虛糜廪粟丞相然之事遂寢至大初調大司農卿公又以疾辭臺臣以風紀之司不振奏選廷臣付以持節之任公一日入侍上問及之公對曰中臺表也諸道景也表正則景正陛下宜慎簡正人以鎮中臺次用剛毅有為者以使諸道則羣有司知畏法矣上曰卿言得之然非卿莫能勝其任即日除公山南江北道肅政亷訪使公至振肅憲度治劾暴强風采凛凛屬部有婦人以殺夫繫獄獄已具公疑其寃重鞫之乃其夫讎家所殺立破械出婦而坐讎家以刑同列以貪墨相尚而反惡公之獨潔語數侵公公嘆曰吾安能與若曹抗衡哉寧謹避之耳遂去官居亡何皆以贓敗人服公之先見至大末改江南諸道行御史臺治書侍御史時御史大夫怙權自尊凡議事自中丞以下皆侍立候顔色莫敢相可否公獨坐與之辨事有不直每執法折之大夫欲變鄂勒氏獄及黜知印靜甲以用其私人公咸力爭其非大夫銜公甚及其還朝仁宗問臺臣優劣丞以危言中公上不答大夫言之不已上怒唾其面出之即遣中使賜以上尊復遷淮西江北道肅政亷訪使廬州從事以受賕被逮纍訊不引伏公一問即吐實曰某信有罪所不即伏者以諸使者與某無大相遠或遷延冀茍免耳明公既至燭下若皎日尚何言遂伏其辜㑹朝廷遣省臣奉使河南僚佐有誤射飛鶬係禁物者即上之大官奉使以其不敬劾免之公抗言曰彼誤中禁物已貢京師復何罪奉使代天子南巡舉賢黜邪咨詢民瘼絶不見之事為顧以執公手曰微子淵多聞吾幾失對矣上憤先朝枋臣舞法不及誅而斃詔法司磔其尸以狥公奏曰斯人元惡萬磔莫贖但時方春初羣彚發育豈為戮一遺骸以傷天地之和哉上稱善上欲選校人材丞相命百工各舉所知有以宦者子為薦者公曰君不見左悺楊復光之事乎上重惜名爵雖宰執官階各降一等君乃欲進此鼠輩耶丞相聞公語叱之使出高麗嗣王兄弟弗睦上欲廢其國為郡縣公曰是不當廢宜遣使諭之使改過自新諭之不從然後擇其宗室之賢者而立之爾丞相偕公入奏上不聽復叩頭力諍久之乃允留司徒以曹夢炎訟田受賂上怒欲賜之死公曰受賂而按田不實罪准枉法論不至于死丞相入奏如公言上疑其私欲窮建斯議者或遽進曰是回回參議也上素知公守法律特釋公不問然怒司徒撓法卒殺之公見上上曰朕雖不用卿言知卿之忠也寵遇彌渥湖廣省臣嘗出兵討殺峒酋及以賄敗上欲置之極刑公曰贓罪應杖律無置死之科况有功可贖過乎不然適足快夷獠心非御將之良術也卒從公議得以不死㑹日食上問其故朝臣泛引漢晉事以天道悠遠為言公對曰日者君象也君不修德則天埀鑒戒方今經理田賦勞師邊境無罪殺楊多爾濟蕭拜珠皆足以致天變唯陛下念之上韙其言鎮戍官犯法舊從行中書總制者决罰後改𨽻樞府事多違忤凡條具機務以國書譯為奏目前是敷繹多剴切詳緻後每簡略不敢盡言公皆請復其舊公在中書與議天下大事剛正峭直略無顧忌至於進賢退不肖正法術厚風俗之屬與丞相言之尤力丞相嘗稱公有經濟才且謂人曰吾以非才備位宰輔每慚見子淵適有除拜左右闞公在告趨丞相以聞丞相遲之暨公起示以銓目公為簡去庸懦及有罪者十有二人丞相顧左右曰吾所以遲遲者為是故也丞相退朝諸佐皆送至私第習以為常公曰是不過鼓為諂媚耳均人臣也於禮何稽乎獨不往丞相益賢之英宗崩晉王踐祚時公在京城俄有㫖捕斬廷臣公懼其有變即夜宿中書與大臣定謀天初明就其家執之如縛狐兔無一得脫者泰定初廷議及海漕事公以廪積方饒奏減糧數以舒東南民力上可其奏拜太子詹事丞進階中奉大夫公上疏言方今國家之本宜擇正人如贊善王恂諭德劉因者𨗳輔庶幾他日可望三代之治上命妙選東僚屬公舉方正之士以聞憸人有來位公上者遂移疾而去改山東東西道肅政亷訪使未上升翰林侍講學士知制誥同修國史公與時相議不合辭遷江浙等處行中書省右丞進階資德大夫以病免歸晉王崩明宗在北藩未至中外危疑羣臣㑹議不决公曰處變異於處常神器久虛非國家之福也皇弟宜居攝以防他變衆論乃定文宗立拜榮祿大夫宣政院使公上言乞沙汰僧道以革游食之弊其所有田宜同民間徵輸擢中書右丞幸臣有以利啖公者曰某氏珍寶田宅咸沒入于官吾屬索之宜無不得者公正色曰既入官即府藏中物尚可覬覦邪况官食非貧縱貧亦士之常也其人怒而止太師太平王權勢熾焰炙手可熱公視之淡如面折廷爭謇謇不少貶故大臣多不樂公者謀出公于外乃除今官公度為時不容力辭還第頃之聞明宗陟方涕泗交頥不能食自是杜門讀書不出者凡數年今上皇帝入繼大統夙夜圖治方徵用老成而公薨矣為震悼者久之尋賜鈔二萬五千緡以恤其家公先配史氏王氏俱前卒無子並封漁陽郡夫人再娶崔氏封齊國太夫人子男五人祐童太中大夫濟寧路總管汝南之袁潁川之陳是已公家自文貞左右兩朝殊績奇勳照耀簡册公之兄弟起而繼之峻躋華要茂建丕猷益有光于前人至子若孫復克纘承惟謹或以長材出膺郡寄或從科目入屬奉常而今治書侍御史尤以功名自砥礪所至輒烈烈有聲人以象賢稱之詩所謂濟濟多士書所謂世篤忠貞服勞王家者非公家之謂歟嗟夫躬親儷美于前而又使嗣人匹休于後非盛德之士不能公實有焉嫓之袁陳未足多讓澤流後裔詎有既邪是宜播之聲詩刻之樂石使來世之士知我朝名臣有如此者不亦揚休無極矣乎銘曰聖皇御天萬方駿奔秉德宣猷厥有世臣猗康里氏遠昭世序逮于文貞克膺帝輔公起承之奕奕其昌宿衛禁宸日受龍光洊典秩宗受膰以牘五持使節拜憲屢肅何姦不鋤何汙不澄嚴霜之下惡草弗生暨參廟論正氣莫奪方之太阿百銼不折上簡主知選二宫端䄂中諫疏言人所難乃候北門乃蒞南國乃宣院政乃登丞弼埀紳正笏屹立龍墀决定大疑為國蓍龜憸任忌之有芒在背俾服大藩出居于外公則夷然歸休于家何以為娛道書平闕皇朝麗天無物不被將詢黃髮以敷至治彼蒼者是胡不愸遺一鑑之亡四國之悲公雖云亡公多孫子益伉其門重圭疊組東安之原馬鬛其封駿發爾祥其來不窮河山帶礪勳在盟府史臣勒辭永詔千古故節婦湯夫人墓碣銘夫人姓湯氏諱潤字妙光處之麗水人奉順大夫溫州路總管府治中諱全之曾孫忠顯校尉贑州路雩都縣尹諱垓之孫敦武校尉溫州路平陽州判官諱鈞之女年十七適同里葉氏為贈奉議大夫江浙等處行中書省左右司郎中諱應咸之冢婦諱珂府君之夫人府君字孟玉氣高岸恥席祖父勢自念丈夫非赤手致功名不可曰能單騎走京師謁陳司徒司徒方有寵于上一見語合謂人曰此吾江南奇少年也亟薦為㑹福院知印文未完卒年始二十一夫人聞之慟幾至隕絶服衰終禮屏脂澤不御寒幌青燈唯孤影相照極可念夫人甘焉或懼不能堪以言嘗之夫人泣曰妾未亡人旦暮死即下從君子游他固不能識妾心若改俟鐵木出條枚乃可爾人聞不敢撼葉故右姓郎中實雩都之壻於夫人為世姻夫人周旋尊章間益盡孝敬處先後由禮弗忒當府君北上二子士徽未晬士綸猶在娠六閲月始生夫人鞠迪之士徽能荷家政不失前人尺寸士綸入儒由金華教諭補吏七閩漕府移浙中彧彧有亷名部使者索公持節行處州亷知夫人貞狀嘆曰是風教所繫不可緩趣州縣具文書吏以年未五十援例辭公罵曰有婦玉潔如此乃欲拘例邪即為按覆以次上中書旌其閭且復役勿事鄉人士過焉相指告曰此節婦無忝是門者咨嗟而去夫人嫠居三十一年以至正壬辰七月五日終春秋四十九孫三士徽子俶信士綸子俊墓在元和鄉洪唐葬之日則癸巳某月某甲子葬後五年戊戌六月府君之弟宣慰副使琛為狀羣行遣士綸來金華徵豫銘銘曰比屋可封孰以節揚宅里是旌世道之傷百鳥紛紜乃見鳳凰我銘夫人用以戒荒體仁守正𢎞道法師金君碑代黃侍講吳之長洲有為老子之學者曰金君諱善信字實之家故儒也曾大父曰琭大父曰暀父曰煥漳州路龍溪縣尹母沈氏顧氏龍溪之墓故翰林侍講學士揭公實為之銘君幼凝靜少長好虛無之說欲辭父母去而求師父母不可授以家事而羈縻之君應酬少間輒取老子書反覆玩味久而曰老子之教初不必毁形絶世若今人之為也吾黨如蓮花生汙穢外接世緣內無所搆鬬何必去父母哉既止不行且納婦有子矣乃曰父母留我者我無不盡其責古之至人雖不必草衣而木食巖棲而穴處然學必有師我將從有道者就正焉時𤣥妙觀有張雷師生不識錢數能以符篆捕逐鬼神君甚敬之由是冠其冠而為之執弟子禮已而聞莫先生洞一者嗜酒醉輒詬罵人雖王公不避時時呼雲役雷狎䙝如兒戲然君知其有道者則延致而尊事之有所折辱未嘗為之動色或毁其所甚愛之物亦不以為意先生知君信之篤悉授以不傳之祕他弟子不得者君盡得之遂建仁夀觀於城東北隅日與其徒研覆妙㫖凡旁門小道力排斥不少置其言以為心神至虛無所汨沒氣定光出諸隂銷盡諸陽自集蓋有形者隂無形者陽陽益勝隂氣益調精我得清淨去道無難矣知之不親見之不明枯槁於山林何益乎蓋其造道之本末可見者如此君初為子弟時無私蓄既壯能使資倍其舊鄉里有糾紛不可解輒為揣摩洞見底裏類使之以自退不爭取勝遇時之名流必加敬禮有不給則周之未嘗務遺世獨立以為高而其襟度特為冲曠闢一室植桂樹若干本於其前題曰桂軒列一二古圖畫徜徉其中飄飄焉神仙人也故賢士大夫多樂與之遊君年雖高而視聽步履如强壯一日呼左右謂曰吾死矣遂奄然而逝非真有所得惡能處生死之際若是哉君生於宋咸淳九年十二月十一日卒於今至順二年二月一日年五十有九以其年三月某日奉道蛻葬武丘鄉半塘之原君所自營也君妻溫氏事舅姑克盡婦道教育其子若女克盡母道人莫不稱之子三人大亨大振大謙惟大謙為溫氏出女四人孫男女合若干人葬後十七年大謙始以建安陳方之狀來徵銘昔老子嘗為周柱下史周之舊典禮經無不知之非棄絶人倫者也至其以無為清淨為教漢人用之而天下以治豈無益之學哉老子遠矣今道家者流所宗漢天師張氏既舉賢良方正直言極諫其子若孫或徵為黃門侍郎或辟為丞相椽祚𦙍相承逮今千餘歲不絶有能遵其軌範無廢人間事而有以究夫道之所存不亦善學老子者乎是可銘也已始君受知嗣天師留國公起為廣德路道録仍提點仁夀觀畀之號曰體仁守正𢎞道法師且以聞于朝再下璽書為之加護豫既備著君之道至於出處之大槩亦不得而略也銘曰老子有云修之於家其德有餘歷世既久襲訛踵僞寢迷厥初歸潔其身長往不返木石與居有美一人清風峻標列仙之儒養生有道不斷外緣神明內腴謂人一心無撓無雜漠然冲虛滌除𤣥覽抱一不二方與道俱惟是所存久而愈晰百世不渝有崇斯丘表以石章過者式諸元故朝列大夫同知婺州路總管府事致仕趙侯神道碑銘有序嗚呼濓尚忍銘我趙侯也邪初侯未亡時嘗謂濓曰生平交友雖多唯待制桞公侍講黃公相知為深二公既已即世吾子其髙弟子也宜有以知我我死子必銘之濓辭不敢當言未幾侯以執節不回遇害而至于死死後三月其子友直復衰絰踵門拜且泣曰先子將終時無他言以必得先生銘為請先生若重辭先子之目將不瞑於地下矣濓聞之與之對哭失聲嗚呼濓尚忍銘我趙侯也耶雖然侯不以濓為不肖每以忘年交視之至其沒也復使執筆以從二公之後其知濓厚矣縱不能文可不具列羣行以白侯於不朽耶謹按狀侯名良勝後更名大訥字敬叔姓趙氏先世有屬籍于宋其諱元儼者實熙陵之第八子封周王諡曰恭肅恭肅生允良封定王定王生宗絳贈太師安康郡王諡曰孝榮孝榮生仲礦奉國軍節度使封南陽侯南陽生士翮贈武節大夫南渡初自開封遷家睦州武節生不玷武義郎因添差監婺州浦江縣稅務徙居浦江為浦江人武義生善近訓武郎訓武生汝遷從義郎從義生崇槺㑹稽縣尉縣尉生必班纍贈奉訓大夫慶元路昌國州知州飛騎尉追封浦江縣男則侯之父也侯少闓敏通蒙古字學遂以譯曹椽起家補泉州録事泉為寶貨之府大商巨室犬牙而居侯不少狥大盜弄兵寧都焚城殺守吏勢甚張州之無賴男子帥衆應之遂謀來攻城侯令沿河作大栅以遏其衝簡强丁數百乘城侯騎白馬奮呼後先士氣百倍寇度不可攻而退中書遣使者造海舟十五艘期五十日成官降諭而不與材民相顧大驚畏使者不敢發一辭侯獨列民貧困狀請益之民為侯生立祠賈胡及惡少年挾帥臣之威肆行市區與文學椽分爭撾之出血侯縛使赴獄轉興化録事官賦多隱弊歲勒受役者代輸侯搜舊官書驗之則鄰縣民産也民服罪大姓數十家倚權貴人久不輸科繇侯役之無所遺屢以重勢撼侯侯不為動浮屠鏡空爭長鏡擊死瘖兒誣之兒忽蘇空執送官官受賂出鏡罪部使者以其牒下侯鏡獄遂成越一年攝莆田縣事縣僧慧與子華競令人殺嬰孩中子華吏入子華死侯亷得實白其寃亭民以兵器私鬬訴官互以計相傾三年不决侯憫其毁家各傳以輕法拜舞而去改漳州路龍溪縣尹俗尚鬼壘石作祠以奉紫衣神黠民將為奸利必殺犬來祭侯投神江中移其石以修孔子廟庭蠻丁峒獠雜居縣境上官稍侵之輒稱兵暴掠至煩大軍終年屯不解侯調御有道不敢為變富民蘇甲怙勢殺人行賕郡守沒其罪侯抱案詣府歷斥其奸守盛怒陷侯以重罪上官察非實侯獲免稅册多虛額應役之家咸破侯於實稅中十加一而均輸之桑門清真共鬪清不勝遂撾死人陷真連坐者餘百侯獨正清以法餘皆釋之侯秩滿歸爭遮道持金為謝侯却去弗受民為樹碑柳營江上奸胥利興作常藉為媒遍侵閭右民侯曰吾不久當更母遺患後人也凡官廨悉新之興大役而民不知咸以為神或出遠郊父老携子弟聚觀各舉手加額曰吾父母也其為人愛慕如此調泉州路永春縣尹僅四月以昌國憂去官未終喪改福州路侯官縣尹不赴俄遷溫州路永嘉縣尹轉運司以鹽壅不行計民口賦之吏遂因緣為病侯令富人買而售於民民安而課登旁州縣則訴于府請如侯法瑞安何良僞為官書指平民私販鹽司逮捕急民自殺者三人事下侯治徙良于汀州巡邏小兵如良為者甚衆侯復痛懲乃已州城枕大江水暴岸善崩侯出新意並江數千尺列植大木先襲其弊者黃冠師建三靈廟以侵學地浮屠據東湖書院田二百三十畝而贏先生皆為復之葺漢先賢徐孺子墓立宋髙士蘇雲卿祠古碑碣所紀有關於名教者必訪求而重刻焉凡可以扶世𨗳民者無不為也豐城學徒挾姦以持校官短長時主教者又不知以職自振每用計相傾先生各坐以其罪聞者心服南康倉吏坐飛糧株連逮繫者百餘家省憲二府檄先生讞其獄先生為鈎擲隱伏所平反者甚多滿秩而歸杜門不出者十餘年先廬數間僅蔽風雨而饘粥或不繼先生處之裕如也先生雖居巖壑海內仰之猶如魯泰山作鎮海隅莫不以其出處為斯文隆替之候風紀行部必過門承問而去至正元年辛巳先生七十二朝廷更化徵用老成臺閣近臣有以先生名聞於上者於是有㫖以翰林待制承務郎兼國史院編修官起先生於家先生即冠帶見使者退謂人曰吾今幸親禁近得陳堯舜之道以贊太平之治死不恨矣㑹貢舉法復行江浙行中書主文衡二年壬午夏五月至官僅七閲月竟以一病不起實冬十一月九日而先生年七十三矣省臺樞府而下皆來歸賻館閣之士至於灑泣集賢大學士吳公直方國子博士吳公師道與經筵檢討危公素共經紀喪事御史中丞張公起巖在成均為同僚友至是哭之尤哀冡孫頴奉靈南還諸公相與陳奠都門見者皆咨嗟隕涕三年癸未冬十二月二十二日與夫人盛氏合葬通化鄉荆山之阡盛氏纍封浦江縣君先十二年卒子男三卣同因孫男三秬和穆秬夭女一所著書有文集若干卷金石竹帛遺文若干卷近思録廣輯三卷字系二卷藏于家先生局度凝定燕居默坐端嚴若神即之如入春風中久與之處未嘗見疾言遽色雖有桀鷔者瞻其德容莫不氣奪而意消孝友本乎天性季弟實出為人後遇之有恩不翅在家者生平以奬進人材為己任諄諄勸誘至者不倦人有一善播之唯恐原闕馬侯曰吾不能馬遂遇害幸不死創甚至七月丁巳竟殁越三日庚申葬于縣東五里之岡士大夫莫不為之出涕帥閫具侯死節請褒贈於朝文雖上不報侯享年八十有一母黃氏縣之士族纍封浦江縣君娶同邑張氏生男子六人友誠友進友淳友恭友年友諒友誠早卒友淳福建行省宣使女二人永嘉縣尉龍泉季某之子某瑞安唐彥驥其壻也次娶永嘉許氏忠簡公景衡七世諸孫女纍封浦江縣君生男子一人友仁少房武林周氏生男子二人友保早卒友聞去家為道士河西張氏生男子三人友直友端友毅皆業儒友端早卒侍姬李氏生女一人適朝列大夫建德路同知總管府事吳薰之子桷桷能文辭孫男六人季祐季寶季真季道季寧季能季明孫女六人皆未行曾孫男一人道貞侯局度精明濟之以亷剛所至以鋤强梗聞吏卒畏威無敢出鄉元豪宿猾或相告引去至於興學校治水利之事尤加之意學田奪於民間者必復之陂湖或不築躬視其成雖大暑寒不避侯生平不識請謁義所當為雖尊官顯人勢相統屬者有不暇遜常自誦曰我有命在天不以柔媚而得不以剛直而失男子之膝可易屈耶君子韙其言侯年既耄賓客故人多勉侯為子孫計何為久自苦侯笑曰吾在泉時寶貨俯地可拾尚弗顧今肯爾邪嗚呼何其賢也士君子能建治功于隆平之日而或不能保大節于危難之時蓋為政以及物者易而殺身以成仁者難侯自歷官縣州以循良之吏著名及至見危授命又如嚴霜烈日可畏可仰不賢而能之乎侯之家食尚若此使當大藩之寄其不能為城郭封疆死守乎執德弗回至死不變在古者猶鮮能之况今人乎賈子所謂顧行而忘利守節而仗義者非侯其誰也是宜銘銘曰天地正氣隨時降升明為日月流為風霆我人得知挺然自生直養無害與我道并在子死孝在婦死貞在臣死忠弗撓弗傾茍無是焉焰然不寧言言趙侯萬人之英歷任州邑以治劇稱大軱錯節不與創爭和而春陽肅而秋刑讋伏暴强撫綏原闕吏有師傅民有父兄逮于懸車方洋里閎崇論竑議有轟其聽鎮譁遏浮方藉老成太白吐芒遭時搶攘侯誓弗屈竟死於兵忠精耿耿上摩日星非氣之正其何以能五星之岡有山若城巨碑巍巍太史勒銘髙風凛然百世可徵趙詵仲墓志銘栝趙君諱友桂字詵仲一字國芳漢恭憲王元佐十二世孫也曾祖曰崇炾祖曰必㘻國子進士父曰良贇集慶路録事司典史君少有志載籍中鈎索義訓如廷尉持法不激不阿務得其平雖經諸講師詮足一有釁罅必讞而鬯之弗鬯弗止也其於天官律厯聲音制度之學尤能窮其㑹通蓋君于古書無所不究援據精博君子多其徵間發為辭章珠潔玉溫絶無鴟盤弩拔之病中山李桓先生自號文章家極慎推與數稱君奧雅不羣君亦視學愈于人恆不可一世客袖文來見讀一二語弗與輒覆手掩几上視雲漢作他語獨善臨海舒卓卓至夜談屢及旦或怒詈如鬪勢或大唬墮幘在地唯恐卓去亟故挽遊仙都山遲之沿道行言猶刺刺逢舊館人揖有目不見飯至且辨且食入咽不計寡多斥去人皆指笑之謂病狂易云君負氣髙意功名可以引手致屢試藝屢黜原闕剝且益之志不少變每拊髀喟曰文未至爾文未至爾文至祿烏能逃我未幾隨父宦金陵歲丙申金陵大亂幸萬死得存驚讋內傷六月十五日患暴下醫不能方越三日卒夀甫三十三未娶無為主後者所著書有夏小正解詩書易諸録辨南泉槀兵後多亡其兄友松深哀之搜羅成書且收君骨還指以某年月日葬南明山之西抱書詣豫哭丐銘其墓豫發書讀之亦泣下嗚呼自師廢民散士安於寡陋獵取凡近以斧藻厥躬妄相標榜謂彼為毛鄭此為韓張嶷然若可名世及叩其傳記所存雖古人常通習者喫喫不能道一語惟瞪目視左右若土偶人是果何為者邪如君者殆可哀已銘曰不昭其熹不融其奇不泄其施遽淪于隳我懷伊人中心孔悲南明之西有氣吐霓化為龍文上貫少微後千萬年於赫弗虧蔣處士墓碣銘婺之東陽有處士曰蔣君者君子人也性純謹無僞自守甚篤遇人恆抑抑然若畏之者或有紛糾出片言諭之雖愚夫則又翕然服簞食豆羮不繼室廬不足蔽風雨君安之唯拯患扶難則竭志慮不遺餘力弟仁出後仲父復來求分田君豫之不吝君疾勞問者無虛日及死莫不哀傷焉君諱崇字伯尚其先自毗陵遷東陽曾大父伯大父忠父元母陳氏娶天台奚夥子男四長偉器次安仁次文懿次淳祚文懿蚤卒女二壻曰張夀一未行亦蚤卒孫男三長公輔次公告次公憲孫女三皆幼君夀六十三卒於元統甲戌正月初八日以至正癸未十月初一日葬於清泉里崑崙山之麓葬後十一年偉器具羣行謁濓為銘濓雖不識君幸辱與偉器交偉器知尚正學非義所在誘以百金不為動觀偉器之行足以知君矣銘何敢辭銘曰君之行一何良也有子為儒知家教之有方也刻文墓門庶千載而彌章也詩塜銘有序番有奇男子曰魯修學詩李存先生先生以文雄江東獨才修修有詩朋十人皆緣情善賦番數經兵燹修懼其詩失傳埏埴為甓刻瘞芝山中瘞已請太史宋濓勒銘其上銘曰河清嶽明效坤之靈何蕤綏兮鳥文龍章于粲其英叶昌厥辭兮冥智斂真返諸至神薶黃壚兮泄為醴泉三秀牛眠合貞符兮番山可夷番川可移道如初兮塔銘妙果禪師塔銘至正初余得邵菴虞公所著妙果禪師語録序而讀之其稱師之道有云江河朔南一碧萬頃有大尊宿譬若摩尼之珠髙懸虛空日月星辰山河草木悉現其中人天鬼神蠢動之衆一一內向皆自以為得所攝受而珠本無留礙余竊意正宗寥落龍象分散而今安復有斯人哉虞公為人善巧深入禪觀故特溢美於師以起人之信心爾非至論也及來秣陵與師諸孫似杞交求其書而細味焉則洪纎高下靡不含攝而𤣥機所凑若涉不思議境然後知師之道𢎞以周而虞公之言實可徵不誣也謹按資福大師廷俊狀師諱水盛字竺源自號無住翁饒之樂平人姓范氏父某母徐師生時有祥光照室及成童以嬉戲為佛事年十七去依羅山院僧常公常使從儒者學而師每習禪定且針指出血書金剛經常呵之師云學儒可敵死生邪常云汝黃口小兒爾姑注意於儒他時入道何晚也師弗知答既受度謁月庭忠公於蔣山時孤舟濟公為第一座以皖山誨䝉山者誨之師撫几云吾已見二老矣乃端坐一室以三百六十骨節八萬四千毫竅及河山大地咸攝入一念始覺變易繼凝定雙瞳與念為一汗從背流亦不知所楚後四三日見色聞聲漸撼搖不動師自信法决可證因取所擕書帙以火焚之且發願云吾此生不能作佛當入無間獄也旁觀者為之吐舌俄過匡廬止東林聞有僧所見不異雲門師往即焉僧以無誠心讓之師復奮云今夕必就蒲茵上死爾即正襟趺坐加精進力如一人臨萬人之敵如操舟上湍悍之灘不遑他接夜參半至極切孤危之際損命一躍不覺如出荆棘之叢所履之地忽爾平沉而秋空素月連娟獨照返觀自身湛湛澄澄唯一念之不忘爾師猶以墜於斷滅益進修弗懈或靜或動未嘗間斷洎歸羅山方全體頓現如器臀之解十方世界舉皆現前參以諸祖契證如鏡照鏡坦然明白師自以為開悟及掌藏鑰東林偶閲妙喜明心見性非桑門事之辭又復致疑不能釋者數日或誚云法離唇吻道紀言詮子何太滯也於是胸中又蕩然如洗然不敢謂已至也越五載重㑹濟公于蔣山濟云蒙山嘗言裁松道者不具二緣而生達摩葬熊耳後隻履西歸果神通耶抑法如是也師云此形神俱妙而已濟云不然也子他日當自知之師復往無為見無能教公以濟所舉之言質之無能云為汝弗解故也師忽大省盡脫去𤣥妙知解歷觀從前所悟如通宵一夢夢時非無及至覺後絶無所得矣無能撫其背而記之云爾後當大𢎞吾宗也師辭去東游四明天童已而歸息浮梁之鳳游山海印如公方長薦福請師分坐說法久之往隱于南巢巢民桞氏割山地建蘭若以棲師地當五峯之下舊有龍潭五所聞師至悉乘風雷徙去識者謂聖人來居故物怪濳遁云天厯已巳達官以聘起師主西湖之妙果師𢎞闡宗㫖震撼四方學徒坌集至有不遠萬里而來者郡守劉公迪戍將齊公􅀈常虛已求道時已行役僧之令師堅欲引去劉公屬縣大夫將免科繇以欵之未幾返南巢故隱而嚮慕者愈衆藩宣讓王纍遣使者致師師以老病固辭淮西亷訪使幹公王倫從監察御史常公道夫本極趨仰時移書牘以辨鍊𤣥乘鄉先正集賢學士傅公立月灣先生吳公存與師為世外交甚篤月灣至有晚始聞道之嘆至正丁亥夏四月二十四日黎明召四衆戒之且云世尊有言我今背痛將入涅槃吾其時矣侍僧捧紙求偈師呵云何以偈為强之乃引紙膝上書已端坐而逝初師預建葬塔於諸峯之下是夜有光如匹練自天際下燭交相通貫未幾散布五峯之頂復合於塔中彌三夕乃止巢之居民凡數十里聚觀駭異之弟子德𢎞慧月慧觀等以是月二十六日奉前身瘞焉世夀七十有三僧臘五十有三聞師之殁緇素無不哀慟而兩淮之人尤切不啻喪其父母師之道浹洽於人者蓋可知矣師常勵學徒云凡剃髮染衣當洞明諸佛心宗行解相應以正悟之境靈靈自照歲久月深具大無畏如透水月華萬浪千波觸之不散方不被生死隂魔所感此師生平之實證實悟者故亦用是以誨人也師制行峻絶有壁立萬仞之意每埀三關語以示人多有不契其機者廣信祝蕃遠嘗云番陽竺源吳中斷崖其人類孤峯懸巖可仰望而不可攀躋人稱之為實録嗚呼大鑑之道分為五家而臨濟之宗為最盛臨濟之傳雖曰豐熾光大覃及東南至五祖演為尤盛今以其世次觀之則自開福寧月菴果老衲證月林觀竹巖印直翁圓無能教至師始八葉耳宜其傳授分明印悟真切有非耳剽目掇者之可同哉余也不敏似杞致慧月之辭來求塔上之銘其請至六七而不倦豫故特舉虞公之言于前而歷著師之悟驗于後使小罔末智未得謂得者覩之庶幾有所懲創矣乎銘曰道大如天地無物可包羅我以一心攝不見有餘缺自非堅固力沒身以為期超出河沙界未易得之者皇皇無住翁誓成無上學一念弗轉移似倚須彌山兩矅互遷代風霆時激射乃至於世間山川及草木胎卵濕化等無日不現前無見亦無聞無無亦皆喪如是歲月深真體忽頓露有若摩尼珠閃映無定色光光皆涉入永無留礙者持之出住世蔚為人天師吐辭鴻鍾吼非宫亦非商間有無耳人聽之三日聾何况示關要險絶在天半萬仞亦見底即墜即糜爛衆生所倚藉冥衢日月燈眷彼毒龍衆獰惡可怖駭亦知所敬畏夜隨風雨逝莊嚴清淨域恐以腥穢故神光起天末如匹練下埀照燭窣堵波散入五峯頂我示涅槃相上𤣥降祥應以表無量法諸天悉護持大風有止時此法無盡藏爰假世間文留鎮于下土佛慧圓明廣照無邊普利大禪師塔銘少林氏之道士傳至慧照大師而别為一宗設三𤣥門演暢宗乘權實兼行照用雙至四方從者雷動海湧逮乎宗季其道寖微惠朗欽公起而任之豎大法幢屹然為東南之標凖廣濟妙公親承法印據獅子巖建立死關鮮有升其門者唯智覺本公深造閫奧以大辨才通博無礙慈澤普滋遍一切處其入室弟子以十數計若今佛慧圓明廣照無邊普利大禪師則其一人也師諱元長字無明一號千巖越之蕭山縣許賢鄉人族姓董氏世以書詩為業父諱九鼎母何氏晚而生師欲棄之嫂謝氏鞠以為子七歲即就外傅諸書經目輒成誦出入蹈矩循彠有若成人其父喜曰是子當以文行亢吾宗乎師之諸父曇芳學佛於富陽法門院欲乞師為嗣謝氏不從未幾師遘疾甚革謝氏禱于觀音大士曰佛幸我慈俾此兒弗死令服灑掃役終身禱己師汗下而愈遂使從芳游時師年始十七益求良師摩切九流百氏之言已而曰此非出世法也復從授經師學法華經至藥王品問曰藥王既然二臂曷為復現本身耶授經師異之年十九剃髮受具戒走武林習律於靈芝寺律師問曰八法往來片無乖角何謂也師曰胡不問第九法乎律師曰問律而答以禪真大乘法器也㑹行丞相府飯僧師隨衆入本公亦在座遙見師即呼謂曰汝日用何如師曰唯念佛爾公曰佛今何在師方擬議公厲聲叱之師遂胡跪作禮求示法要公以狗子無佛性之語授之繼往縛禪靈隱山中雪庭傳公召師掌內記師下筆成章五采交燦見者嘆服俄棄歸法門隨順世緣殆將十載一旦忽喟然曰生平氣志充塞乾坤乃今作甕裏醯雞耶復造靈隱跏趺危坐脅不沾席者三年因往望亭聞鵲聲有省闕見本公具陳悟因公復斥之師憤然來歸夜將寂忽鼠翻食猫之器墮地有聲恍然開悟覺身躍起數丈如蟬蛻汙濁之中浮游𤣥間上天下地一時清朗披衣待旦復往質於公公問曰趙州何故云無師曰鼠餐猫飯公曰未也師曰飯器破矣公曰破後云何師曰築碎方甓公乃微笑祝師曰汝宜善自護持棲遁巖穴時節若至其理自彰師既受付囑乃隱天龍之東庵耽悅禪味不與外緣有二蛇日來環繞座下師為說三皈五戒蛇矯首低昂作拜勢而去師自是聲光日顯笑隱欣公方主中竺法席力薦起之江浙行省丞相托歡公時領宣政院事亦遣使迫師出世師皆不聽居亡何諸名山爭相勸請師度不為時所容與弟子希升杖錫踰濤江而東至烏傷之伏龍山見山形如青蓮花乃卓錫巖際誓曰山若有水吾將止焉俄山泉溢出作白乳色師遂依大樹以居實泰定丁卯冬十月也初伏龍山有禪寺號聖夀其廢已久當師入山時鄉民咸夢有異僧來遂相率登孱顔披䝉幕以訪焉見師晏坐不動各持食飲之物獻之邑大姓樓君如浚樓君一得各為伐木搆精廬以安師尋因舊號建大伽藍重樓傑閣端門廣殿輝映林谷內而齊魯燕趙秦隴閩蜀外而日本三韓八番羅甸交趾留仇莫不奔走臚拜咨决心學留者恆數百人至有求道之切斷臂師前以見志者師各隨其根性而為說法譬如一雨所施小大根莖悉獲沾潤王公大臣嚮師之道如仰日月名傾朝廷三遣重臣降名香以寵嘉之江淮雄藩名宣讓王則下令加護其教若鎮南王則親書寺額賜僧伽黎衣及普應妙智辨禪師之號帝都亦再降㫖俾勢家無有所侵陵仍更號曰佛慧圓鑒大元普濟大禪師資政院又為啓于東朝命朝臣製令號并金幱法衣以賜焉至正丁酉夏六月十四日師示微疾索浴更衣㑹衆書偈云平生饒舌今日敗闕一句轟天正法眼滅遂投筆而逝春秋七十四夏五十六是日午時其弟子德亨德馨等用陶器函蓋奉全身瘞于青松菴悲慟依戀聲撼嵓壑太師中書右丞相托克托公建大夀元忠國寺為皇太子祝釐之地欲奏起師為住持適有自江南來者言師示寂乃止師踈眉秀目豐頥美髯才思英發超越醜夷頃刻千偈包含無量妙義得其片言皆珍襲寶護惟謹語録若干卷和智覺擬寒山詩若干首皆刻梓行于叢林世之論者謂師踐履真實談辨迅利或無愧於智覺云濓初往伏龍山見師師吐言如奔雷時濓方尚氣頗欲屈之相與詰難數千言不契而退越二年又往見焉師問曰聞君閲盡大藏教有諸濓曰然曰君耳閲乎抑目觀也曰亦目觀爾曰使目之能觀者君謂誰耶濓揚眉向之於是相視一笑自時厥後知師之道超出有無實非凡情之可窺測因締為方外之交埀三十年其激揚義諦往來尺牘之在篋衍者墨尚濕也雖纒於世相不能有所證入而相知最深銘非濓為而孰宜為之銘曰天目嵓嵓中設死關豈無來者望門而還言言智覺仗劍深入師子長號百獸咸蟄伊誰嗣之惟千嵓師彼碩者鼠爰契我機一錫行雲遁藏空谷明珠自護不受人觸世雖不聞靈苑先知矯首聽法為說三歸我將辭名文彩或露足踏飛濤一夕東度龍峯鬱環如青蓮花我棲其間指樹為家兆之所形孰曰無象有來兟兟且饁且餉化被草莽為梵王宫金銀琉璃絢爛太空四方風動無不稽首師我檀度願埀攝受羣聾正酣晝夜沉冥法音方震萬耳皆驚璨璨珠璣噴落人世神鬼莫窺天龍交衛有寵自天錫豫便蕃金衣寶薰耀於袛園外護之嚴罔敢干令慧照之宗於斯為盛乘化而逝人天慕哀妙相如如初無去來既無去來何有增減太史勒銘以昭𤣥範表辭諸暨孝婦楊方石表辭嗚呼是惟孝婦方氏之墓夫孝未易稱余獨歸之孝婦而不靳者將以愧為人婦之不孝者也孝婦姓方氏諱迎越之暨陽人生二十七年歸同里楊君敬敬有母何氏孝婦左右就養唯恐違其志何病腑道澀不能親御偃溷孝婦浸之湯盆中以指探出之積歲之久手文皆龜裂而孝婦未嘗有倦色昔人有為親浣厠褕者史臣尚以為難載之于策矧孝婦之事尤人所難者耶人之所難者且若是則孝婦其他之行弗問而可知也嗚呼是尚不得為孝婦矣乎使如此而不得為孝則夫勃溪而不恭者乃足為孝乎豫自成童時讀劉向所傳古孝婦事以為斯世何為無此人心雖未敢必其無然歷三十餘年卒不能一逢嗚呼余豈意今於暨陽乃見之也暨陽距豫金華僅二百里豫昔嘗兩至其處而不知有孝婦至今始得知之嗚呼豫又意世之如孝婦者夫豈少哉特以不遇於君子故湮草萊而人弗聞之爾其弗聞者豫固無如之何其幸而得聞者可不大書揭之崇阡以愧人婦之不孝者耶非惟愧人婦也抑將愧人子也孝婦性儉慈頗知讀書嘗鬻田教子父德載母張皆宦族年六十一生二子恆慧其卒以至正二年九月五日其葬於馬鞍山以三年十二月草二日云志故檢校孔君權厝志故奉議大夫湖廣等處行中書省檢校官孔公諱瀛字世表宣聖五十三世孫初家曲阜四十七世曰傳始遷衢故事孔子之後得補文學掾公年二十有司以名上署昌國州學正教授嶽州湖北亷訪使者辟為書吏除江浙等處儒學副提舉階將仕郎公乘馬出道逢宣政使騶從甚都公直前不避使使人讓之公曰我真聖人之裔官乃僞浮屠豈應相避邪政成以入廣例升尹海陽改沅江二邑民安之湖南亂公供億軍中朝廷録其勞授以今官尋以使事入蜀議連兵殄寇至蜀蜀亂公間關巴峽間久之復經雲夢泛洞庭回鄂鄂又亂妻張氏思樵溺死從者散盡唯繼室高昌氏及㸑下兩丁嫗存公度鄂不可居航彭蠡直趨豫章尋自豫章下九江九江又亂百具咸沒公被垢衣倀倀走持孔氏南北譜唯恐失之見者或曰迂人哉或曰此知本者也公一弗顧轉徙來金陵依富川族孫克仁居遂卒高昌氏生子公已在泉下奈之何不哀乎濓聞公死哭之慟克仁請志其事因抆淚以書其略若公羣行之詳則有俟於撰銘文者贊龍眠居士畫十八應真相贊第一尊者張拱立海牛脊絶流而過指海為地截斷衆流尚不見水何所覔牛第二尊者遡風立飛濤中足踏鉢多羅手提天地靡物弗舉只一盂間收盡海水第三尊者乘芭蕉葉傲睨太空水珠亂濺葉上何分水陸即海是路未入水時一葉已渡第四尊者與前尊者共泛蕉葉一沙彌荷槖隨後局步殊甚天上地下獨立無偶沙彌何人乃躡其後第五尊者坐綵帨中雪眉埀兩肩四海鬼獰甚舁之行長眉埀肩不原闕去任爾東西弗離故處第六尊者橫杖在腕有大黿自東而西黿半隱水中杖挑須彌目鑠日月愍諸有情證龜成鱉第七尊者瞪目東望口噓氣成雲雲中現七成塔景無縫寶塔不因外見優鉢曇華千年一現第八尊者玩塔景微笑一王孫持果獻之景固非真塔亦是假一笑之餘語默雙捨第九尊者氣貌甚偉杖錫衝衝行足下寶珠輪有光炫耀如火平視四極一杖指定足下寶珠圓光交映第十尊者騎海魚魚鼓鬛而逝有洋洋自適意乘魚而來我未嘗乘青山瞥過白雲如蒸第十一尊者布杖于海赤足躡之杖如龍悠然西奔汝杖猶龍游戲海中一息萬里不假寸風第十二尊者左手擎梵鉢噬脣仰視小龍蜿蜒自南來昂首作奮勢真龍出現風雲應符雨大法雨普活焦枯第十三尊者踞崖石坐左攬衣右舒指指空若有所示一指之下領納大千真如境界不分中邊第十四尊者手執修多羅欲讀未讀回顧鄰坐者佛尚不有何况于言無水起波中復駕船第十五尊者側耳聽經神觀清淨如在禪定時經從耳入當以目聽耳目兩忘非動非定第十六尊者騎鹿行山檜柏蕭森隂颸翛翛吹衣騎鹿而行何曾移步欲問西來笑指庭樹第十七尊者跨斑文虎手持降魔法杵過前巖巖下雜華如畫為無怖畏全提宗印大吼一聲萬山皆震第十八尊者藉草趺坐作入定相白毫光宛轉起兩眉間瞑目而坐心同太虛一塵不立無缺無餘血書華嚴經贊有序上人善繼嚴持梵行欲求無上真如之道嘗自念言華嚴大經實中天調御第一時所說一乘頓教最為尊勝欲爇松為煤入以香藥搗和成劑以書此經而彼松煤者假物所就具黑暗相有染白法欲煆汞為丹承以空露研潤如法以書此經而彼汞丹者炫耀可觀能盲人目非助道者欲椎赤金素銀亷薄如紙復粉為泥以書此經而彼金若銀者雖曰重寶外塵為體初不自內以是思惟身外諸物若勝若劣若非勝非劣若一若多若非一非多皆不足以稱此殊利維我一身內而心膂肺肝外而毛髮膚爪資血以生資血以成資血以長資血以至壯老暨死是則諸血衆生甚愛如梵摩尼一滴之微莫肯捨者我今誓發𢎞願於世雄前以所難捨而作佛事從十指端刺出鮮丹盛於清淨器中養以溫火澄去白液取其真純蘸以霜毫志心繕寫滿八十卷尊閣半塘夀聖教寺昔者樂法比丘當無佛時欲聞佛語了不能得乃信婆羅門言以皮為紙以骨為筆以血為墨願書一偈况今百千妙頌十萬正文不止于一縱捐軀命以報佛恩無足為異於血何吝唯願法界有情或見或聞證入雜華藏海己即得六根清淨得六根清淨已即得自性清淨得自性清淨已即得四天下微塵剎土中一切衆生皆悉清淨無相居士未出母胎母夢異僧手寫是經來謂母曰吾乃永明延夀宜假一室以終此卷母夢覺已居士即生今逢勝因頓憶前事於是親􅌊五分妙香香雲輪囷結為寶網遍覆經上乃復合爪向佛散華作禮而稱贊曰雜華淨智海九㑹之所說一音所演唱十處放光明信解行證門總攝無復餘如是具五周如是辨六相如是分十𤣥妙義皆充足以至四法界二十重華藏無邊香水海教條有差别性相了無礙圓融與行布非異亦非同一可為無量無量亦為一重重無有盡是為功德聚如來最上乘龍宫所祕藏上人出身血嚴飭書此經於一滴血中普含十方界於一一界中普現光明臺於一一臺中普成獅子座於一一座中普見分身佛如上無數佛皆具大威德眉間白毫光遍滿一切處共宣大乘法聞者應解脫譬如日月王照三千大千悉見種種色法能破暗故譬如大洋海一平乃如掌無丘陵堆阜法能平等故譬如陽春至大地盡發生諸根各萌芽法能沾溉故譬如梵志夢一夢千劫事不過剎那間法能融攝故譬如子憶母未見心已至形神皆兩忘法能無離故譬如黃金色金色不相分金亡即色空法能不二故譬如石性堅初不從外得石性自圓滿法無修證故能如斯見解見經不見血若加精進力見佛不見經及至成道已見性不見佛我性如虛空了無能見者無見中有見全體即呈露茍執於所見亦非我本性見見二俱泯此為真見見真見復何有性本無物故一心歸命禮祗夜以為贊諸妙樓閣門彈指一時啓觀音大士觀瀑像贊南贍部洲東新羅國有一苾芻號曰靈囦以三昧力於一毫端現大士相其相云何寶冠華􅀢表衣繡翻翹足而坐於崖石間其崖東邊有一石狹狹中有水下注無際其水微妙如娑羅林自根而莖自莖而條前後相續無間斷者大士旁睨容顔端嚴舉手指水不喜不慍沙門似祀具大辨才覩是相已五體投地而作是言水之怒者無如流瀑飛空直下其長或至一千餘仞或至三萬及無算數鬪巖射壑晝夜六時無有暫捨雖神鬼衆聞其音聲亦生而畏譬諸衆生曠大劫來以迄今兹無明所覆造諸惡業火性所激觸山抵石以至殞命肝腦塗地方其怒時盡十方界日月星宿霞電雲露盡十方界山林墳衍草木鳥獸盡十方界州邑樓閣民人聚落了無所見以何因緣怒所激故怒火所及有明皆喪大士所指因水以喻明覺其性慈憫方便最為第一爾時于越有一長者塢波索迦聞沙門言瞻仰讚嘆善哉善哉沙門當知不識水性因石而怒為復石怒緣水乃見或水石中各有怒性謂水之性其怒因石怒在水外水性無怒長江鼓濤懷山蕩陸其勢可怖非關于石謂石之性其怒因水怒在石外石性無怒懸崖下崩飛電擊空聲聞百里非關于水謂水與石各有怒性一鱗不生側涵太虛內外若鏡不見有怒屹立弗磨苔蝕蘚封萬古如一怒從何起沙門當知法界無邊空為本性性中本空中實非空萬物蕩摩展轉成妄如水流躍非水之性舍彼二者欲求水性了不可得如石裂霣非石之性舍彼二者欲求石性亦不可得如是思惟微塵國土山河大地或淨或垢皆吾法身諸佛菩薩天龍八部夜義羅剎有情無情皆吾法性性中所具不遺一物一物不留法界衆生無明煩惱即是如來正遍知覺善思念之此乃大士因水以喻明覺真性沙門聞我所說妙法歡喜踊躍異口同音共說無上伽陀章句稽首毗盧華藏海無量光明遍一切本來清淨無染著凡夫逐妄以迷真有如空裏本無華空裏華生由眼翳華生華滅剎那間空相如如元不動願憑大士般若力脫此八萬塵勞門縱如瀑流千萬變轉物不為物所轉矧兹幻象出毫端境相了知非實有因非實有悟真空即證如來大圓智跋跋清凉國師所書棲霞碑代黃侍講唐攝山棲霞寺律大師碑華嚴疏主清凉國師所書也國師越之㑹稽人飛來山寶林寺實其得度故處今住山同公舊讀裴相國所撰妙覺塔銘而知國師得二王之筆法又聞趙魏公稱國師字畫之妙而知相國之言為可徵每嘆其書罕傳於世今年春出游吳中始從報恩萬歲寺住上人得此墨本歸而刻諸石屬豫志於下方謹按國師以大厯三年受詔入內譯經為潤文大德是年三月二日律師示寂而碑之建在明年三月十二日今去之已五百八十年覩其遺刻法度森嚴神采奮發而國師之德容猶可藉是想見也國師世夀百有二書此時甫三十有一或者妄計其晚歲安住毗盧華藏必不復作如是游戲事豫竊不敢謂然法身大士應化人間於一毫端現諸萬象卷舒無礙寂用常如塵心交入無非法果覽者毋徒弊焉索之於形迹之間庶幾目擊而道存也跋何道夫所著宣撫鄭公墓銘右宋資政殿學士鄭忠愍公墓志銘一通祕監何耕道夫之所撰也道夫廣漢人故知公治蜀之為悉而公之行能勞烈亦獨於蜀為最著紹興中公為川陜宣撫副使患蜀之困於漕運也乃於關外四州及興州大安軍行營田之法所營至二千除糧種分給外實入官十四萬一千四十九斛而金州墾田五百六十七頃歲入萬八千六十餘斛不與焉志中所謂移司益昌以便餽運繼修營田之政是也蜀雖罷兵而財用不足歲計猶闕錢七百七十八萬緡公奏增印錢引四百萬復患無錢以權之即利州鑄錢歲十萬緡以救錢引之弊率費二千而得千錢置官六人兵匠五百人歲用監官錢七萬四路稱提錢十四萬緡為鑄本其後增至十五萬蜀中因此優裕宣總所樁積錢五千餘萬緡其餘苛賦一切裁削志中所謂減科數至七百萬緡是也公在閫時吳武順璘以右護軍都統制駐武興郭恭毅浩以樞密院都統制駐漢隂楊襄毅政以宣司都統制居漢中皆擁强兵自衛勢與大帥抗莫敢吐一語相可否公恩威並立獨能帖服之如犬羊每入謁必先庭揖然後就坐志中所謂三大將拱手側足奉命惟謹是也嗚呼公治蜀六年而能俾財用足橫斂減悍將服其效乃章章如此使久於其職又將何如也奈何天未厭亂姦檜得秉鈞軸忌公不附已而竄逐以死悲夫然公之見忌於檜士大夫皆能誦之至於道夫亦為檜之所忌則或者未必盡知之也道夫嘗為類省試第一故事榜首不赴大對者賜進士及第恩數視殿試第三人蓋優之也檜方欲沮張魏公而道夫對策歷論蜀人難進易退之節有高視天下竊笑之語檜嫉之乃諭禮部令奏但賜進士出身道夫亦視之淡如未嘗一踐貴人門登第三十年始召為倉部郎纍遷至祭酒鄉人趙溫叔為相雅欲相鈎致亦不肯就及溫叔罷蜀人為所引者皆被逐獨道夫不染物議使其居公之位其尚肯屈志以附檜乎雖職位不同功績遂異道夫清峻之節未必有愧於公也然則公之墓志非道夫為之孰可為之哉公之子德肖不求之他人而屬之道夫良有以也吾友彥淵氏公之九世孫以葉史君昌父所書此册求題故濓以所聞疏公治蜀之績而詳及道夫之事使覽者知士大夫立身以名節自砥礪有不隨世而磨滅者必將惕然自省也道夫以淳熙辛丑春始拜朝請大夫試祕書監之命其後輒求去乃除知潼川府今以祕書繫銜則志文作於是歲春夏之間無疑史君公同郡人果齊俞先生之高弟子雖南康之節不完然字畫儘佳鮮于伯幾謂其極善用筆至欲下拜而此册尤其得意書可寶也因併及之至正十八年三月二十五日里後學宋濓謹題跋金剛經後先佛所說大部般若合六百卷凡四處一十六㑹而此金剛經實當第二處第九㑹第五百七十七卷姚秦鳩摩羅什此云童夀天生人始用華言翻定元魏菩提流支陳真諦隨笈多唐𤣥奘義淨相繼各有所譯號為六家唯什本詳略適中甚得義趣而梁蕭統復分第為三十二故今稱盛行于世其二十一分增多六十二字即非什本而後人據五譯以鈔入之爾世之名僧逹賢詮釋此經殆且百家獨無著天親二論師配一十八住斷二十七疑允合先佛微妙第一真實了義濓欲據之作集解一部病於烽火未息志莫能遂因繕録成卷置巾箱中朝夕玩繹庶幾了空名相洞明覺地他日於一毫端現諸萬象破種種迷成種種智尚未能晚也至正十八年四月初一日無相居士金華宋濓題跋長春子手帖右長春真人丘公與其弟子宋道安手帖首言吾宗承傳次第非一朝夕者蓋自東華少陽君得老聃之道以授漢鍾離權權授唐進士吕巖遼進士劉操操授宋之張伯端伯端授石泰泰授薛道光道光授陳柟柟授白玉蟾玉蟾授彭耜此則世所號南宗者也巖授金之王嚞嚞授七弟子其一即公餘曰談處端曰劉處𤣥曰闕處一曰郝太一曰馬鈺及鈺妻孫不二此則世所號北宗者也又言金真之原闕知明君始者知明嚞之字也咸陽大魏村人凡三易名字初原闕允卿再為世雄德威合今為三也大定丁亥閠七月十八日知明抵寧海州鈺之夫婦首師事之遂築室於其南園題曰全真庵四方學者咸集自是凡宗其道者皆號全真道士云又言已至大雪山之陽棲霞之事如何者棲霞觀名也公以興定已卯受詔見我元太祖皇帝於奈蠻國弟子十八大師皆從庚辰二月入燕城辛已三月踰嶺而北七月至阿布哈山留道安等九人立棲霞觀壬午四月見止大雪山之陽癸未五月辭歸帖言已至雪山則決在壬午法華經跋原闕旦塔廟在在放光明譬如日月行中天不分淨穢皆照了須知不假身外求心佛衆生元不别常境如如本無相常智寂寂亦無緣三觀三締皆現前不分後先與中外居士欲報慈母德繕書入梓以流通一一毫端現諸佛熾然說法遍十方見聞無不能信心共入毗盧華藏海跋俞先輩所述富春子事實後宋季時有孫君者其先居富春因自呼富春子七嵗而病瞽遇異人授以音律推五數播五行之術其於萬物始終盛衰恆於音决之周垣未第時坐於觀橋市肆厲聲詬僕孫君聞其聲往揖之曰狀元何怒邪周以其紿已不答後果擢進士第一楊克齊同鄧中山遊虎林㑹孫君亦至楊戲君曰我何如人孫君曰公貴人也曰我食祿乎抑白衣也曰公自慶元初類試調瀘川尉浮沉久之歷知晉果二州矣何謂白衣楊大驚復問曰吾祿止是乎或未也曰不久即遷大理少卿再典一大藩却從方外之士遊爾已而由理官以直寶謨閣知重慶府遂主管千秋鴻禧觀以終江子遠舍選出身教授池州負氣好凌人當路惡之欲誣以罪孫君曰不可子遠雖少未易輕蔑二十年後必秉國鈞也其後言輒驗程言公集客命孫君次第聽其聲聽已歷指曰此異時朝士也此異時院轄也此異時法從也此異時執政也旁有韋布之士劉姓者聞其語夸笑之孫君曰汝何人乃敢爾邪或曰母相慢此祕書丞劉公也孫君曰太白山老儒生耳烏能入祕書衆一笑而罷吉公籍記其言無一人差者其神奇往往類此惜乎為史嵩之所忌謫死遠方也今去孫君百有餘年故老凋落殆盡人罕有知其事者狀觀余先生用中所述猶可見前輩聞見閎肆有非安于寡陋者所可企及如濓不敏于先生無能為役今因孫君六世孫朝可求題遂以舊聞附於先生論著之後以補其所未足焉若夫孫君所言趙籙已迄王元春典鄉郡李全貢玉柱斧及詐假布囊四字太史氏嘗録之今不敢瀆告之也孫君名守榮先生謂為高榮意其筆誤或别有依據云雜言蘿山雜言濓自居青蘿山山深無來􅀈者日玩天人之理久之似覺粗有所得作蘿山雜言君子之道與天地並運與日月並明與四時並行冲然若虛淵然若潛渾然若無隅凝然若弗移充然若不可以形拘測之而弗知用之而弗窮唯其弗知是以極微唯其弗窮是以有終至虛至靈者心視之無形聽之無聲探之不見其所廬一或觸焉繽繽乎萃也炎炎乎燕也莽莽乎馳弗息也茍不以畏為君而欲抑之勤之檢之押之苞之涵之是猶教猿學禮也不亦左乎子不見嬰兒乎目不留采色故明全耳不留音聲故聰全舌不留苦甘故味全君子則之養其聰晦其明忘其味是之謂通原通原則幾乎聖人不用則已用則為天下獨六經皆故迹新入之機不同其機確確其履濯濯其機采采其履昧昧甚哉其機也人以文視經斯繆已善察機者其以質視經乎絲絲棼棼乃政之分純純謐謐乃政之一是故聖人馴而弗擾靖而弗逸明而弗察勤而弗煩弗擾故民舒弗逸故民寧弗察故民寬弗煩故民裕四者有失則天下受其害守正莫過于一一故弗二弗二則明明則神神則無不通天下之能事畢矣是故聖人之學貴一天下一物也譬之千鈞烏獲能舉之力不獲若則或壓焉或僨焉甚可畏也然則舉天下有要乎曰有德以懷之刑以威之隂陽相摩晝夜相環善惡相形梟鳳相峙梁藜相茂勢也亦理也君子欲盡絶小人得乎哉鳥之羽者兩其足獸之角者去其齒天地生物尚有不能而况衆人乎故曰功有所不全力有所不任才有所不足行遇刃者必避食逢鴆者必舍懼害已也麗色藏劍厚味臘毒則弗之察愚矣雞司晨犬警夜雖堯舜不能廢人有棄小善而弗采者非道哉以文徼名名必隳以貨徇身身必亡隳故無成亡因有爭唯君子知名不可徼身不可徇是謂守素守素則治治乃昭昭乃純純乃誠內修不暇奚事外欲皎皎兮不緇容容兮不知其所窮如擁鑑如持衡隨媺惡輕重而應焉其君子之心也哉天無言而生殺遂伸兮則榮屈兮則悴亦何容力哉故君子與天合德不察察以自恃乎不默默以求全乎不赫赫以鷙翔乎不縮縮以雉伏乎能純一乎能絶外誘乎能山立而海受乎如是者謂之近道彼因氣强吾以義剛彼因氣弱吾以仁柔剛柔强弱之間不容一髮知者行之是謂得天不肖者悖之是謂失天人有奔走而求首者或告之曰爾首不亡也指以示之豁然而悟學者之於道亦然世求聖人於人求聖人之道於經斯遠已我可聖人也我言可經也弗之思耳天下之事或小或大或簡或煩或虧或贏或同或異難一矣君子以方寸心攝之了然不見其有餘以術干祿者敗以財樹家者禍以勢臨人者辱以安自恃者危以學自眩者禽以行自翹者僞是六疾也慈則和儉則裕勇則决明則遠容則聚是五懿也去六疾行五懿方有為於天下書白衢州三衢沈君持正來為烏傷文學掾豫謁之持正盛稱其守白侯之賢豫問曰侯定科繇何如曰衢為州雖據東浙上游厥田惟下下入賦以斛計僅三萬三千有畸豪有力者兼并且善避役役多在貧人侯察其奸令民自實田以田定賦一州服其平侯律已何如曰侯清約甚飲衢水外一物不煩衢民每旦徒行入府署野夫不識與爭道不問庭有訟民立為疏直枉皆免冠叩頭謝長子自沔陽來越旬即遣歸唯一童給侍朝夕未幾亦遣侯馭吏若𨽻何如曰吏抱案立左右唯侯言是裁不敢以意出入之𨽻人數不逾九凡冒𨽻名巡聚落以病人者悉罷去去年春藩府以善治聞天子嘉之遣使賜束帛衢人咸為侯榮豫問已顧謂二三子曰此南陽白景亮明甫也明甫自征東行省譯曹椽起家四轉而來為是州甚有惠政昔豫聞蘭溪吳德基言若此今持正又盛稱其賢故豫屢問之持正言與德基同則白侯之賢信已使牧郡國者皆得如侯則下民之瘼庶幾其有瘳乎秦士録鄧弼字伯翊秦人也身長七尺雙目有紫稜開合閃閃如電能以力雄人鄰牛方鬬不可擘拳其脊折仆地市門石鼓十人舁弗能舉兩手持之行然好使酒奴視人人見輒避曰狂生不可近近則必得奇辱一日獨飲倡樓蕭馮兩書生過其下急牽入共飲兩生素識其人力拒之弼怒曰君終不我從必殺君亡命走山澤耳不能忍君苦也兩生不得已從之弼自據中筵指左右揖兩生坐呼酒歌嘯以為樂酒酣解衣箕踞拔刀置案上鏗然鳴兩生雅聞其酒狂欲起走弼止之曰勿走也弼亦粗知書君何至相視如涕唾今日非速君飲欲少吐胸中不平氣耳四庫書從君問即不能答當血是刀兩生曰有是哉據摘七經數十義叩之弼歷舉傳疏不遺一言復詢歷代史上下三千年纚纚如貫珠弼笑曰君等伏乎未也兩生相顧慘沮不敢再有問弼索酒被髮跳呌曰吾今日壓倒老生矣古者學在養氣今人一服儒衣反奄奄欲絶徒欲馳騁文墨兒撫一世豪傑此何可哉此何可哉君等休矣兩生素負多才藝聞弼言大愧下樓足不得成步歸詢其所與游亦未嘗見其挾册呻吟也泰定末德王執法西御史臺造書數十言袖謁之閽卒不為通弼曰若不知關中有鄧伯翊耶連擊數人聲聞于王王令𨽻人捽入欲鞭之弼盛氣曰公奈何不禮壯士今天下雖號無事東海島夷尚未臣順間者駕海艫互市于鄞即不滿所欲出火刀斫柱殺傷我中國民諸將軍控弦引矢追至大洋且戰且却其傷國體為已甚西南諸蠻雖曰稱臣奉貢乘黃左纛稱制與中國等尤志士所同憤誠得如弼者一二輩驅十萬人磨劍伐之則東西止日所出入莫非王土矣公奈何不禮壯士庭中人聞之皆縮頸吐舌久不能收王曰爾自號壯士解持矛鼓譟前登堅城乎曰能百萬軍中可刺大將乎曰能突圍潰陳得保首領乎曰能王顧左右曰姑試之問所須曰鐵鎧良馬各一雌雄劍二王即命給與隂戒善槊者五十人馳馬出東門外然後遣弼往王自臨觀空一府隨之暨弼至衆槊並進弼虎吼而奔人馬辟易五十步而目無色已而烟塵漲天但見雙劍飛舞雲霧中連斫馬首墮地血涔涔滴王拊髀歡曰誠壯士誠壯士命酌酒勞弼弼立飲不拜由是狂名振一時至比之王鐵搶云王上章薦諸天子㑹丞相與王有隙格其事不下弼環視四體嘆曰天生一具銅筋鐵肋不使立勳萬里外乃槁死三尺蒿下命也亦時也尚何言遂入王屋山為道士後十年終史官曰弼死未二十年天下大亂中原數千里人影殆絶𤣥鳥來降失家競棲林木間使弼在必當有以自見惜哉弼鬼不靈則已若有靈吾知其怒髮上衝也宋景濓未刻集卷下
